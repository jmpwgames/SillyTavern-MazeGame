    function placeWallDressings(root) {
        const style = state.style;
        const decorMaterialCache = new Map();
        const placedTypeByCell = new Map();
        const artworkPool = shuffledArtworkList();
        let artworkCursor = 0;

        function decorCategory(type) {
            if (type === 0 || type === 1 || type === 2) return 'frame';
            if (type === 3 || type === 6) return 'shelf';
            if (type === 4 || type === 7) return 'cabinet';
            if (type === 5 || type === 8) return 'banner';
            return 'sconce';
        }

        function chooseDecorType(baseType, x, y, signature) {
            const baseCategory = decorCategory(baseType);
            let bestType = baseType;
            let bestScore = Infinity;
            for (let t = 0; t < 10; t++) {
                let sameType = 0;
                let sameCategory = 0;
                for (let oy = -2; oy <= 2; oy++) {
                    for (let ox = -2; ox <= 2; ox++) {
                        if (ox === 0 && oy === 0) continue;
                        const prev = placedTypeByCell.get(`${x + ox},${y + oy}`);
                        if (!Number.isInteger(prev)) continue;
                        if (prev === t) sameType += 1;
                        if (decorCategory(prev) === decorCategory(t)) sameCategory += 1;
                    }
                }

                const west1 = placedTypeByCell.get(`${x - 1},${y}`);
                const west2 = placedTypeByCell.get(`${x - 2},${y}`);
                const north1 = placedTypeByCell.get(`${x},${y - 1}`);
                const north2 = placedTypeByCell.get(`${x},${y - 2}`);
                let streakPenalty = 0;
                if (west1 === t && west2 === t) streakPenalty += 4;
                if (north1 === t && north2 === t) streakPenalty += 4;

                const categoryShiftPenalty = (decorCategory(t) === baseCategory) ? 0 : 0.7;
                const tie = (hash32(x, y, signature, t * 131 + state.mazeSeed) % 1000) / 1000;
                const score = sameType * 5 + sameCategory * 1.4 + streakPenalty + categoryShiftPenalty + tie;
                if (score < bestScore) {
                    bestScore = score;
                    bestType = t;
                }
            }
            return bestType;
        }

        function nextArtwork() {
            if (!artworkPool.length) return null;
            if (artworkCursor >= artworkPool.length) return null;
            const pick = artworkPool[artworkCursor];
            artworkCursor += 1;
            return pick;
        }

        function getDecorMats(x, y) {
            const tone = hash32(x, y, state.mazeSeed, state.styleVariant * 13) % 7;
            if (decorMaterialCache.has(tone)) return decorMaterialCache.get(tone);
            const mats = {
                woodMat: new THREE.MeshStandardMaterial({
                    color: liftMinLuma(jitterColor(style.trim, tone + 1, 11, 9), 56),
                    map: getWoodTexture(style, tone + 17, 23),
                    normalMap: getWoodNormalTexture(style, tone + 17, 23),
                    normalScale: new THREE.Vector2(0.14, 0.14),
                    roughnessMap: getWoodRoughnessTexture(style, tone + 17, 23),
                    roughness: 0.72,
                    metalness: 0.08,
                }),
                fabricMat: new THREE.MeshStandardMaterial({ color: liftMinLuma(blendHex(jitterColor(style.accent, tone + 5, 23, 14), style.wall, 0.16), 58), roughness: 0.9, metalness: 0.02 }),
                frameMat: new THREE.MeshStandardMaterial({
                    color: liftMinLuma(jitterColor(style.brass, tone + 7, 29, 10), 70),
                    roughness: 0.38,
                    metalness: 0.72,
                    roughnessMap: getWoodRoughnessTexture(style, tone + 41, 31),
                }),
                mirrorMat: new THREE.MeshStandardMaterial({ color: liftMinLuma(jitterColor(0x9ea4ad, tone + 9, 31, 6), 78), roughness: 0.18, metalness: 0.7 }),
            };
            decorMaterialCache.set(tone, mats);
            return mats;
        }

        for (let y = 1; y < state.rows - 1; y++) {
            for (let x = 1; x < state.cols - 1; x++) {
                if (state.grid[y][x] !== 0) continue;
                const dxSpawn = x - state.player.x;
                const dySpawn = y - state.player.y;
                if ((dxSpawn * dxSpawn + dySpawn * dySpawn) <= (DRESSING_SPAWN_SAFE_RADIUS * DRESSING_SPAWN_SAFE_RADIUS)) continue;
                const opens = openNeighborCount(x, y);
                if (opens === 4) continue;

                const p = gridToWorld(x, y);
                const mats = getDecorMats(x, y);
                const sides = [
                    { dx: 0, dy: -1, nx: 0, nz: -1, yaw: Math.PI },
                    { dx: 1, dy: 0, nx: 1, nz: 0, yaw: -Math.PI / 2 },
                    { dx: 0, dy: 1, nx: 0, nz: 1, yaw: 0 },
                    { dx: -1, dy: 0, nx: -1, nz: 0, yaw: Math.PI / 2 },
                ];

                let placedInCell = false;
                let fallbackSconce = null;

                for (let si = 0; si < sides.length; si++) {
                    const s = sides[si];
                    if (!isWall(x + s.dx, y + s.dy)) continue;

                    const signature = hash32(x, y, state.mazeSeed, si + state.styleVariant * 31);

                    const wallX = p.x + s.nx * (TILE * 0.5);
                    const wallZ = p.z + s.nz * (TILE * 0.5);
                    const insetX = wallX - s.nx * 0.01;
                    const insetZ = wallZ - s.nz * 0.01;
                    const distToCenter = Math.abs((insetX - p.x) * s.nx + (insetZ - p.z) * s.nz);
                    if (distToCenter < HALL_CENTER_CLEARANCE) continue;

                    if (!fallbackSconce) fallbackSconce = { insetX, insetZ, nx: s.nx, nz: s.nz, signature };

                    const placementThreshold = opens === 2 ? 68 : 74;
                    const chance = signature % 100;
                    if (chance > placementThreshold) continue;

                    const baseType = signature % 10;
                    const type = chooseDecorType(baseType, x, y, signature);
                    let placedType = null;

                    if (type === 0 || type === 1) {
                        const artwork = nextArtwork();
                        if (!artwork) {
                            spawnSconce(root, { x: insetX, z: insetZ, nx: s.nx, nz: s.nz }, style, signature + 201);
                            placedType = 9;
                            placedInCell = true;
                            placedTypeByCell.set(`${x},${y}`, placedType);
                            continue;
                        }

                        const frame = new THREE.Mesh(new THREE.BoxGeometry(0.62, 0.84, 0.04), mats.frameMat);
                        frame.position.set(insetX, 1.52, insetZ);
                        frame.rotation.y = s.yaw;
                        setShadowFlags(frame, false, true);
                        root.add(frame);
                        const artMat = new THREE.MeshStandardMaterial({
                            color: 0xffffff,
                            map: getArtworkTexture(artwork.file),
                            roughness: 0.82,
                            metalness: 0.02,
                        });
                        const art = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.7, 0.02), artMat);
                        art.position.set(insetX - s.nx * 0.02, 1.52, insetZ - s.nz * 0.02);
                        art.rotation.y = s.yaw;
                        setShadowFlags(art, false, true);
                        root.add(art);
                        placedType = type;
                        placedInCell = true;
                    } else if (type === 2) {
                        const artwork = nextArtwork();
                        if (!artwork) {
                            spawnSconce(root, { x: insetX, z: insetZ, nx: s.nx, nz: s.nz }, style, signature + 401);
                            placedType = 9;
                            placedInCell = true;
                            placedTypeByCell.set(`${x},${y}`, placedType);
                            continue;
                        }

                        const mirrorFrame = new THREE.Mesh(new THREE.BoxGeometry(0.56, 0.96, 0.04), mats.woodMat);
                        mirrorFrame.position.set(insetX, 1.45, insetZ);
                        mirrorFrame.rotation.y = s.yaw;
                        setShadowFlags(mirrorFrame, false, true);
                        root.add(mirrorFrame);
                        const artMat = new THREE.MeshStandardMaterial({
                            color: 0xffffff,
                            map: getArtworkTexture(artwork.file),
                            roughness: 0.8,
                            metalness: 0.02,
                            emissive: 0x111111,
                            emissiveIntensity: 0.18,
                        });
                        const portrait = new THREE.Mesh(new THREE.BoxGeometry(0.42, 0.8, 0.02), artMat);
                        portrait.position.set(insetX - s.nx * 0.02, 1.45, insetZ - s.nz * 0.02);
                        portrait.rotation.y = s.yaw;
                        setShadowFlags(portrait, false, true);
                        root.add(portrait);
                        placedType = type;
                        placedInCell = true;
                    } else if (type === 3 || type === 6) {
                        spawnWallShelf(root, { x: insetX, z: insetZ, nx: s.nx, nz: s.nz }, mats, style, signature + 71);
                        placedType = type;
                        placedInCell = true;
                    } else if (type === 4 || type === 7) {
                        spawnWallCabinet(root, { x: insetX, z: insetZ, nx: s.nx, nz: s.nz }, mats, style, signature + 113);
                        placedType = type;
                        placedInCell = true;
                    } else if (type === 5 || type === 8) {
                        spawnWallBanner(root, { x: insetX, z: insetZ, nx: s.nx, nz: s.nz }, mats, style, signature + 157);
                        placedType = type;
                        placedInCell = true;
                    } else {
                        spawnSconce(root, { x: insetX, z: insetZ, nx: s.nx, nz: s.nz }, style, signature);
                        placedType = 9;
                        placedInCell = true;
                    }

                    if (placedInCell && Number.isInteger(placedType)) {
                        placedTypeByCell.set(`${x},${y}`, placedType);
                    }
                }

                if (opens === 2 && !placedInCell && fallbackSconce) {
                    spawnSconce(root, { x: fallbackSconce.insetX, z: fallbackSconce.insetZ, nx: fallbackSconce.nx, nz: fallbackSconce.nz }, style, fallbackSconce.signature + 997);
                    placedTypeByCell.set(`${x},${y}`, 9);
                }
            }
        }
    }

    function chooseWallpaperFamily(x, y, axisTag) {
        const zone = getZoneId(x, y);
        return hash32(
            zone.length,
            zone.charCodeAt(0) || 0,
            zone.charCodeAt(zone.length - 1) || 0,
            axisTag + state.styleVariant * 17,
        ) % 6;
    }

    function chooseWallpaperVariant(x, y, axisTag) {
        const zone = getZoneId(x, y);
        return hash32(
            zone.charCodeAt(0) || 0,
            zone.charCodeAt(zone.length - 1) || 0,
            zone.length,
            axisTag + state.styleVariant * 13,
        ) % 8;
    }

    function chooseZoneVariant(x, y) {
        return hash32(x >> 3, y >> 3, state.mazeSeed, state.styleVariant * 19) % 5;
    }

    function buildGeometry() {
        if (state.sceneRoot) {
            scene.remove(state.sceneRoot);
        }
        const root = new THREE.Group();
        state.sceneRoot = root;
        scene.add(root);

        const style = state.style;
        updateSceneLighting();

        const floor = new THREE.Mesh(
            new THREE.PlaneGeometry(state.cols * TILE + 6, state.rows * TILE + 6),
            new THREE.MeshStandardMaterial({
                color: 0xffffff,
                map: getFloorAlbedoTexture(style),
                normalMap: getFloorNormalTexture(style),
                normalScale: new THREE.Vector2(0.24, 0.24),
                roughnessMap: getFloorRoughnessTexture(style),
                roughness: 0.78,
                metalness: 0.03,
            }),
        );
        floor.position.y = -0.02;
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        root.add(floor);

        const ceiling = new THREE.Mesh(
            new THREE.PlaneGeometry(state.cols * TILE + 6, state.rows * TILE + 6),
            new THREE.MeshStandardMaterial({
                color: style.ceiling,
                map: getPlasterTexture(style, 5 + state.styleVariant),
                normalMap: getPlasterNormalTexture(style, 5 + state.styleVariant),
                normalScale: new THREE.Vector2(0.16, 0.16),
                roughnessMap: getPlasterRoughnessTexture(style, 5 + state.styleVariant),
                roughness: 0.88,
                metalness: 0.01,
            }),
        );
        ceiling.position.y = WALL_H;
        ceiling.rotation.x = Math.PI / 2;
        ceiling.receiveShadow = true;
        root.add(ceiling);

        if (GEOMETRY_PROFILE === 'nuke') {
            const wallDepth = 0.16;
            const wallMat = new THREE.MeshBasicMaterial({ color: style.wall });

            for (let y = 0; y < state.rows; y++) {
                let x = 0;
                while (x < state.cols) {
                    const start = x;
                    while (x < state.cols && state.grid[y][x] === 0 && isWall(x, y - 1)) x++;
                    if (x > start) {
                        const end = x - 1;
                        const pStart = gridToWorld(start, y);
                        const pEnd = gridToWorld(end, y);
                        const runLen = (end - start + 1) * TILE;
                        const wall = new THREE.Mesh(new THREE.BoxGeometry(runLen, WALL_H, wallDepth), wallMat);
                        wall.position.set((pStart.x + pEnd.x) * 0.5, WALL_H * 0.5 - 0.01, pStart.z - TILE * 0.5);
                        setShadowFlags(wall, false, true);
                        root.add(wall);
                    } else {
                        x++;
                    }
                }

                x = 0;
                while (x < state.cols) {
                    const start = x;
                    while (x < state.cols && state.grid[y][x] === 0 && isWall(x, y + 1)) x++;
                    if (x > start) {
                        const end = x - 1;
                        const pStart = gridToWorld(start, y);
                        const pEnd = gridToWorld(end, y);
                        const runLen = (end - start + 1) * TILE;
                        const wall = new THREE.Mesh(new THREE.BoxGeometry(runLen, WALL_H, wallDepth), wallMat);
                        wall.position.set((pStart.x + pEnd.x) * 0.5, WALL_H * 0.5 - 0.01, pStart.z + TILE * 0.5);
                        setShadowFlags(wall, false, true);
                        root.add(wall);
                    } else {
                        x++;
                    }
                }
            }

            for (let x = 0; x < state.cols; x++) {
                let y = 0;
                while (y < state.rows) {
                    const start = y;
                    while (y < state.rows && state.grid[y][x] === 0 && isWall(x - 1, y)) y++;
                    if (y > start) {
                        const end = y - 1;
                        const pStart = gridToWorld(x, start);
                        const pEnd = gridToWorld(x, end);
                        const runLen = (end - start + 1) * TILE;
                        const wall = new THREE.Mesh(new THREE.BoxGeometry(wallDepth, WALL_H, runLen), wallMat);
                        wall.position.set(pStart.x - TILE * 0.5, WALL_H * 0.5 - 0.01, (pStart.z + pEnd.z) * 0.5);
                        setShadowFlags(wall, false, true);
                        root.add(wall);
                    } else {
                        y++;
                    }
                }

                y = 0;
                while (y < state.rows) {
                    const start = y;
                    while (y < state.rows && state.grid[y][x] === 0 && isWall(x + 1, y)) y++;
                    if (y > start) {
                        const end = y - 1;
                        const pStart = gridToWorld(x, start);
                        const pEnd = gridToWorld(x, end);
                        const runLen = (end - start + 1) * TILE;
                        const wall = new THREE.Mesh(new THREE.BoxGeometry(wallDepth, WALL_H, runLen), wallMat);
                        wall.position.set(pStart.x + TILE * 0.5, WALL_H * 0.5 - 0.01, (pStart.z + pEnd.z) * 0.5);
                        setShadowFlags(wall, false, true);
                        root.add(wall);
                    } else {
                        y++;
                    }
                }
            }

            return;
        }

        const bandMaterials = GEOMETRY_DEBUG_NO_TEXTURES
            ? {
                wainscot: new THREE.MeshBasicMaterial({ color: blendHex(style.trim, style.woodDark, 0.22), side: THREE.DoubleSide }),
                wallpaper: new THREE.MeshBasicMaterial({ color: blendHex(style.wall, 0xffffff, 0.06), side: THREE.DoubleSide }),
                upper: new THREE.MeshBasicMaterial({ color: blendHex(style.upperWall, style.wall, 0.18), side: THREE.DoubleSide }),
            }
            : {
                wainscot: new THREE.MeshStandardMaterial({
                    color: style.trim,
                    map: getWoodTexture(style, state.styleVariant + 17, 1),
                    normalMap: getWoodNormalTexture(style, state.styleVariant + 17, 1),
                    normalScale: new THREE.Vector2(0.28, 0.28),
                    roughnessMap: getWoodRoughnessTexture(style, state.styleVariant + 17, 1),
                    roughness: 0.78,
                    metalness: 0.06,
                    side: THREE.DoubleSide,
                }),
                wallpaper: new THREE.MeshStandardMaterial({
                    color: blendHex(style.wall, 0xffffff, 0.08),
                    map: getPlasterTexture(style, state.styleVariant + 3),
                    normalMap: getPlasterNormalTexture(style, state.styleVariant + 3),
                    normalScale: new THREE.Vector2(0.2, 0.2),
                    roughnessMap: getPlasterRoughnessTexture(style, state.styleVariant + 3),
                    roughness: 0.88,
                    metalness: 0.02,
                    side: THREE.DoubleSide,
                }),
                upper: new THREE.MeshStandardMaterial({
                    color: blendHex(style.upperWall, style.wall, 0.16),
                    map: getPlasterTexture(style, state.styleVariant + 9),
                    normalMap: getPlasterNormalTexture(style, state.styleVariant + 9),
                    normalScale: new THREE.Vector2(0.16, 0.16),
                    roughnessMap: getPlasterRoughnessTexture(style, state.styleVariant + 9),
                    roughness: 0.9,
                    metalness: 0.01,
                    side: THREE.DoubleSide,
                }),
            };

        const bands = [
            { h: WAINSCOT_H, y: WAINSCOT_H * 0.5 - 0.015, mat: bandMaterials.wainscot },
            { h: WALLPAPER_H, y: WAINSCOT_H + WALLPAPER_H * 0.5 - 0.015, mat: bandMaterials.wallpaper },
            { h: UPPER_WALL_H, y: WAINSCOT_H + WALLPAPER_H + UPPER_WALL_H * 0.5, mat: bandMaterials.upper },
        ];

        const emitHorizontal = (y, north, band) => {
            let x = 0;
            while (x < state.cols) {
                const start = x;
                while (x < state.cols && state.grid[y][x] === 0 && (north ? isWall(x, y - 1) : isWall(x, y + 1))) x++;
                if (x > start) {
                    const end = x - 1;
                    const runLen = (end - start + 1) * TILE;
                    
                    for (let i = start; i <= end; i++) {
                        let mat = band.mat;
                        if (band === bands[1]) {
                            const family = chooseWallpaperFamily(i, y, north ? 0 : 2);
                            const variant = chooseWallpaperVariant(i, y, north ? 0 : 2);
                            const zoneVariant = chooseZoneVariant(i, y);
                            mat = mat.clone();
                            mat.map = getWallpaperTexture(style, family, variant, north ? 0 : 2, zoneVariant);
                            mat.normalMap = getWallpaperNormalTexture(i, y, style, family, variant, north ? 0 : 2, zoneVariant);
                            mat.roughnessMap = getWallpaperRoughnessTexture(i, y, style, family, variant, north ? 0 : 2, zoneVariant);
                        }

                        const pStart = gridToWorld(i, y);
                        const wall = new THREE.Mesh(new THREE.PlaneGeometry(TILE, band.h), mat);
                        wall.position.set(pStart.x, band.y, pStart.z + (north ? -TILE * 0.5 : TILE * 0.5));
                        wall.rotation.y = north ? Math.PI : 0;
                        setShadowFlags(wall, false, true);
                        root.add(wall);
                    }
                } else {
                    x++;
                }
            }
        };

        const emitVertical = (x, west, band) => {
            let y = 0;
            while (y < state.rows) {
                const start = y;
                while (y < state.rows && state.grid[y][x] === 0 && (west ? isWall(x - 1, y) : isWall(x + 1, y))) y++;
                if (y > start) {
                    const end = y - 1;
                    
                    for (let i = start; i <= end; i++) {
                        let mat = band.mat;
                        if (band === bands[1]) {
                            const family = chooseWallpaperFamily(x, i, west ? 1 : 3);
                            const variant = chooseWallpaperVariant(x, i, west ? 1 : 3);
                            const zoneVariant = chooseZoneVariant(x, i);
                            mat = mat.clone();
                            mat.map = getWallpaperTexture(style, family, variant, west ? 1 : 3, zoneVariant);
                            mat.normalMap = getWallpaperNormalTexture(x, i, style, family, variant, west ? 1 : 3, zoneVariant);
                            mat.roughnessMap = getWallpaperRoughnessTexture(x, i, style, family, variant, west ? 1 : 3, zoneVariant);
                        }

                        const pStart = gridToWorld(x, i);
                        const wall = new THREE.Mesh(new THREE.PlaneGeometry(TILE, band.h), mat);
                        wall.position.set(pStart.x + (west ? -TILE * 0.5 : TILE * 0.5), band.y, pStart.z);
                        wall.rotation.y = west ? -Math.PI / 2 : Math.PI / 2;
                        setShadowFlags(wall, false, true);
                        root.add(wall);
                    }
                } else {
                    y++;
                }
            }
        };


        for (const band of bands) {
            for (let y = 0; y < state.rows; y++) {
                emitHorizontal(y, true, band);
                emitHorizontal(y, false, band);
            }
            for (let x = 0; x < state.cols; x++) {
                emitVertical(x, true, band);
                emitVertical(x, false, band);
            }
        }

        if (!GEOMETRY_DEBUG_NO_TEXTURES && TEXTURE_POLICY.decals) placeAgingDecals(root);

        // Objective telegraph: key + halo
        const keyObj = state.interactables.get('key');
        if (keyObj && keyObj.state === 'active') {
            const p = gridToWorld(keyObj.x, keyObj.y);
            const faceDir = Number.isInteger(keyObj.faceDir) ? keyObj.faceDir : ((getDeadEndOpenDirection(keyObj.x, keyObj.y) + 2) % 4);
            const wallNormal = DIRS[faceDir];
            const wallX = p.x + wallNormal.x * (TILE * 0.43);
            const wallZ = p.z + wallNormal.y * (TILE * 0.43);
            const yaw = dirToYaw(faceDir);

            const plaque = new THREE.Mesh(
                new THREE.BoxGeometry(0.56, 0.56, 0.04),
                new THREE.MeshStandardMaterial({ color: style.brass, emissive: style.brass, emissiveIntensity: 0.12, roughness: 0.35, metalness: 0.7 }),
            );
            plaque.position.set(wallX - wallNormal.x * 0.02, 1.18, wallZ - wallNormal.y * 0.02);
            plaque.rotation.y = yaw;
            root.add(plaque);

            const keyMesh = new THREE.Mesh(
                new THREE.TorusGeometry(0.22, 0.06, 12, 20),
                new THREE.MeshStandardMaterial({ color: state.style.keyGlow, emissive: state.style.keyGlow, emissiveIntensity: 0.7, roughness: 0.25, metalness: 0.72 }),
            );
            keyMesh.position.set(wallX - wallNormal.x * 0.06, 1.18, wallZ - wallNormal.y * 0.06);
            keyMesh.rotation.y = yaw;
            setShadowFlags(keyMesh, false, false);
            root.add(keyMesh);

            const stem = new THREE.Mesh(
                new THREE.BoxGeometry(0.09, 0.32, 0.03),
                new THREE.MeshStandardMaterial({ color: state.style.keyGlow, emissive: state.style.keyGlow, emissiveIntensity: 0.65, roughness: 0.3, metalness: 0.68 }),
            );
            stem.position.set(wallX - wallNormal.x * 0.06, 0.94, wallZ - wallNormal.y * 0.06);
            stem.rotation.y = yaw;
            root.add(stem);

            const keyGlow = new THREE.Mesh(
                new THREE.PlaneGeometry(0.62, 0.62),
                new THREE.MeshBasicMaterial({ color: state.style.keyGlow, transparent: true, opacity: 0.26, depthWrite: false }),
            );
            keyGlow.position.set(wallX - wallNormal.x * 0.2, 1.16, wallZ - wallNormal.y * 0.2);
            keyGlow.rotation.y = yaw;
            root.add(keyGlow);
        }

        // Objective telegraph: locked study door
        const doorObj = state.interactables.get('study_door');
        if (doorObj) {
            const p = gridToWorld(doorObj.x, doorObj.y);
            const faceDir = Number.isInteger(doorObj.faceDir)
                ? doorObj.faceDir
                : ((getDeadEndOpenDirection(doorObj.x, doorObj.y) + 2) % 4);
            const wallNormal = DIRS[faceDir];
            const inward = { x: -wallNormal.x, y: -wallNormal.y };
            const tangent = { x: -wallNormal.y, y: wallNormal.x };
            const yaw = dirToYaw(faceDir);
            const wallX = p.x + wallNormal.x * (TILE * 0.43);
            const wallZ = p.z + wallNormal.y * (TILE * 0.43);
            const frameX = wallX - wallNormal.x * 0.03;
            const frameZ = wallZ - wallNormal.y * 0.03;

            const doorMat = new THREE.MeshStandardMaterial({
                color: state.style.door,
                map: getWoodTexture(style, state.styleVariant + 3, 29),
                normalMap: getWoodNormalTexture(style, state.styleVariant + 3, 29),
                normalScale: new THREE.Vector2(0.18, 0.18),
                roughnessMap: getWoodRoughnessTexture(style, state.styleVariant + 3, 29),
                roughness: 0.56,
                metalness: 0.16,
            });
            const frameMat = new THREE.MeshStandardMaterial({
                color: style.trim,
                roughness: 0.74,
                metalness: 0.08,
                map: getWoodTexture(style, state.styleVariant + 3, 9),
                normalMap: getWoodNormalTexture(style, state.styleVariant + 3, 9),
                normalScale: new THREE.Vector2(0.12, 0.12),
                roughnessMap: getWoodRoughnessTexture(style, state.styleVariant + 3, 9),
            });
            const frameTop = new THREE.Mesh(new THREE.BoxGeometry(TILE * 0.86, 0.16, 0.2), frameMat);
            frameTop.position.set(frameX, 2.46, frameZ);
            frameTop.rotation.y = yaw;
            root.add(frameTop);
            const frameLeft = new THREE.Mesh(new THREE.BoxGeometry(0.12, 2.44, 0.2), frameMat);
            frameLeft.position.set(frameX - tangent.x * (TILE * 0.36), 1.22, frameZ - tangent.y * (TILE * 0.36));
            frameLeft.rotation.y = yaw;
            root.add(frameLeft);
            const frameRight = new THREE.Mesh(new THREE.BoxGeometry(0.12, 2.44, 0.2), frameMat);
            frameRight.position.set(frameX + tangent.x * (TILE * 0.36), 1.22, frameZ + tangent.y * (TILE * 0.36));
            frameRight.rotation.y = yaw;
            root.add(frameRight);

            const doorX = frameX - wallNormal.x * 0.06;
            const doorZ = frameZ - wallNormal.y * 0.06;

            if (doorObj.state === 'active') {
                const door = new THREE.Mesh(new THREE.BoxGeometry(TILE * 0.7, 2.34, 0.12), doorMat);
                door.position.set(doorX, 1.17, doorZ);
                door.rotation.y = yaw;
                setShadowFlags(door, true, true);
                root.add(door);
                const panelTop = new THREE.Mesh(new THREE.BoxGeometry(TILE * 0.48, 0.72, 0.025), frameMat);
                panelTop.position.set(doorX + inward.x * 0.07, 1.63, doorZ + inward.y * 0.07);
                panelTop.rotation.y = yaw;
                root.add(panelTop);
                const panelBottom = new THREE.Mesh(new THREE.BoxGeometry(TILE * 0.5, 0.9, 0.025), frameMat);
                panelBottom.position.set(doorX + inward.x * 0.07, 0.78, doorZ + inward.y * 0.07);
                panelBottom.rotation.y = yaw;
                root.add(panelBottom);
                const handle = new THREE.Mesh(new THREE.SphereGeometry(0.04, 8, 8), new THREE.MeshStandardMaterial({ color: 0xd1b47a, roughness: 0.35, metalness: 0.8 }));
                handle.position.set(doorX + tangent.x * (TILE * 0.22) + inward.x * 0.07, 1.16, doorZ + tangent.y * (TILE * 0.22) + inward.y * 0.07);
                root.add(handle);
                const lockPlate = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.12, 0.02), new THREE.MeshStandardMaterial({ color: style.brass, roughness: 0.35, metalness: 0.85 }));
                lockPlate.position.set(doorX + tangent.x * (TILE * 0.22) + inward.x * 0.08, 1.16, doorZ + tangent.y * (TILE * 0.22) + inward.y * 0.08);
                lockPlate.rotation.y = yaw;
                root.add(lockPlate);
            } else {
                const openedDoor = new THREE.Mesh(new THREE.BoxGeometry(TILE * 0.7, 2.34, 0.12), doorMat);
                openedDoor.position.set(doorX + tangent.x * (TILE * 0.25) + inward.x * 0.12, 1.17, doorZ + tangent.y * (TILE * 0.25) + inward.y * 0.12);
                openedDoor.rotation.y = yaw - Math.PI / 3.3;
                root.add(openedDoor);
            }
        }

        placeWallDressings(root);
    }

    function isInteractAvailable() {
        const keyObj = state.interactables.get('key');
        if (keyObj && keyObj.state === 'active' && keyObj.x === state.player.x && keyObj.y === state.player.y) {
            const keyFaceDir = Number.isInteger(keyObj.faceDir) ? keyObj.faceDir : ((getDeadEndOpenDirection(keyObj.x, keyObj.y) + 2) % 4);
            if (state.player.dir === keyFaceDir) return true;
        }

        const f = getForwardCell();
        if (keyObj && keyObj.state === 'active' && keyObj.x === f.x && keyObj.y === f.y) {
            return true;
        }

        const doorObj = state.interactables.get('study_door');
        if (doorObj && doorObj.state === 'active' && doorObj.x === f.x && doorObj.y === f.y) {
            return true;
        }
        return false;
    }


    function getAvailableActions() {
        const actions = [];
        // Forward
        const f = getForwardCell();
        if (isWalkable(f.x, f.y)) actions.push('UP');

        // Left
        const leftDir = (state.player.dir + 3) % 4;
        const l = { x: state.player.x, y: state.player.y };
        if (leftDir === 0) l.y--;
        else if (leftDir === 1) l.x++;
        else if (leftDir === 2) l.y++;
        else if (leftDir === 3) l.x--;
        if (isWalkable(l.x, l.y)) actions.push('LEFT');

        // Right
        const rightDir = (state.player.dir + 1) % 4;
        const r = { x: state.player.x, y: state.player.y };
        if (rightDir === 0) r.y--;
        else if (rightDir === 1) r.x++;
        else if (rightDir === 2) r.y++;
        else if (rightDir === 3) r.x--;
        if (isWalkable(r.x, r.y)) actions.push('RIGHT');

        return actions;
    }

    function postObjectiveState() {
        const interactAvailable = isInteractAvailable();
        const availableActions = getAvailableActions();
        const doorObj = state.interactables.get('study_door');
        const doorInteractable = (doorObj && doorObj.state === 'active' && state.objective?.keyCollected);
        try {
            window.parent.postMessage({
                type: 'MAZE_OBJECTIVE_STATE',
                objective: state.objective?.text,
                status: state.objective?.status,
                hint: state.objective?.hint,
                interactAvailable,
                doorInteractable,
                availableActions,
                layout: state.objectiveLayout,
            }, '*');
        } catch {
            // ignore
        }
        hintEl.textContent = `Objective: ${state.objective?.text || ''} ${state.objective?.hint ? ' | ' + state.objective.hint : ''}`;
    }

    function notifySessionRestart() {
        try {
            window.parent.postMessage({ type: 'EJS_SESSION_RESTART' }, '*');
        } catch {
            // Ignore failures
        }
        postObjectiveState();
    }

    function interact() {
        if (isCameraTransitionActive()) return;
        const keyObj = state.interactables.get('key');
        if (keyObj && keyObj.state === 'active' && keyObj.x === state.player.x && keyObj.y === state.player.y) {
            const keyFaceDir = Number.isInteger(keyObj.faceDir) ? keyObj.faceDir : ((getDeadEndOpenDirection(keyObj.x, keyObj.y) + 2) % 4);
            if (state.player.dir === keyFaceDir) {
                keyObj.interact(state);
                updateCameraFromState();
                return;
            }
            state.objective.hint = 'Face the wall-mounted key and press ENTER.';
            postObjectiveState();
            return;
        }

        const keyForward = getForwardCell();
        if (keyObj && keyObj.state === 'active' && keyObj.x === keyForward.x && keyObj.y === keyForward.y) {
            keyObj.interact(state);
            updateCameraFromState();
            return;
        }

        const f = getForwardCell();
        const doorObj = state.interactables.get('study_door');
        if (doorObj && doorObj.state === 'active' && doorObj.x === f.x && doorObj.y === f.y) {
            doorObj.interact(state);
            updateCameraFromState();
            return;
        }
        state.objective.hint = 'Nothing to interact with here.';
        postObjectiveState();
    }

    let bloopContext = null;
    function playBloop() {
        if (!audioState.unlocked) return;
        if (!bloopContext) bloopContext = new (window.AudioContext || window.webkitAudioContext)();
        if (bloopContext.state === 'suspended') bloopContext.resume();
        const osc = bloopContext.createOscillator();
        const gain = bloopContext.createGain();
        osc.connect(gain);
        gain.connect(bloopContext.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(220, bloopContext.currentTime);
        gain.gain.setValueAtTime(0.585, bloopContext.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, bloopContext.currentTime + 0.1);
        osc.start();
        osc.stop(bloopContext.currentTime + 0.1);
    }

    function playEnterBloop() {
        if (!audioState.unlocked) return;
        if (!bloopContext) bloopContext = new (window.AudioContext || window.webkitAudioContext)();
        if (bloopContext.state === 'suspended') bloopContext.resume();
        const osc = bloopContext.createOscillator();
        const gain = bloopContext.createGain();
        osc.connect(gain);
        gain.connect(bloopContext.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(440, bloopContext.currentTime);
        gain.gain.setValueAtTime(0.585, bloopContext.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, bloopContext.currentTime + 0.1);
        osc.start();
        osc.stop(bloopContext.currentTime + 0.1);
    }

    function triggerCollisionBump() {
        if (isCameraTransitionActive()) return;
        const p = gridToWorld(state.player.x, state.player.y);
        const yaw = dirToYaw(state.player.dir);
        startCameraTransition('forward', 200, p, p, yaw, yaw);
    }

    function moveForward() {
        if (isCameraTransitionActive()) return;
        const from = gridToWorld(state.player.x, state.player.y);
        const yaw = dirToYaw(state.player.dir);
        const f = getForwardCell();
        if (!isWalkable(f.x, f.y)) {
            triggerCollisionBump();
            playBloop();
            return;
        }
        state.player.x = f.x;
        state.player.y = f.y;
        const to = gridToWorld(state.player.x, state.player.y);
        startCameraTransition('forward', FORWARD_TRANSITION_MS, from, to, yaw, yaw);
        playFootstep();
        postObjectiveState();
    }

    function turnLeft() {
        if (isCameraTransitionActive()) return;
        const p = gridToWorld(state.player.x, state.player.y);
        const startYaw = dirToYaw(state.player.dir);
        state.player.dir = (state.player.dir + 3) % 4;
        startCameraTransition('turn', TURN_TRANSITION_MS, p, p, startYaw, startYaw + (Math.PI / 2));
        postObjectiveState();
    }

    function turnRight() {
        if (isCameraTransitionActive()) return;
        const p = gridToWorld(state.player.x, state.player.y);
        const startYaw = dirToYaw(state.player.dir);
        state.player.dir = (state.player.dir + 1) % 4;
        startCameraTransition('turn', TURN_TRANSITION_MS, p, p, startYaw, startYaw - (Math.PI / 2));
        postObjectiveState();
    }

    function turnBack() {
        if (isCameraTransitionActive()) return;
        const p = gridToWorld(state.player.x, state.player.y);
        const startYaw = dirToYaw(state.player.dir);
        state.player.dir = (state.player.dir + 2) % 4;
        startCameraTransition('turn', BACK_TURN_TRANSITION_MS, p, p, startYaw, startYaw + Math.PI);
        postObjectiveState();
    }

    function handleControl(index, value = 1) {
        if (Number(value) !== 1) return;
        if (!audioState.unlocked) {
            markAudioEnabled();
            void tryUnlockAudio();
        }
        if (Number(index) === INPUT_INDEX.FORWARD) moveForward();
        else if (Number(index) === INPUT_INDEX.LEFT) turnLeft();
        else if (Number(index) === INPUT_INDEX.RIGHT) turnRight();
        else if (Number(index) === INPUT_INDEX.BACK) turnBack();
        else if (Number(index) === INPUT_INDEX.ENTER || Number(index) === INPUT_INDEX.A) interact();
    }

    function isFullscreen() {
        return document.fullscreenElement === container;
    }

    async function toggleFullscreen() {
        try {
            if (!isFullscreen()) {
                await container.requestFullscreen();
            } else {
                await document.exitFullscreen();
            }
        } catch {
            // ignore
        }
        updateFullscreenButton();
        resize();
    }

    function updateFullscreenButton() {
        fsToggle.textContent = isFullscreen() ? 'Exit Fullscreen' : 'Fullscreen';
    }

    const overlayElements = [muteToggle, fsToggle, hintEl];
    let overlayFadeTimer = null;

    function hideOverlays() {
        for (const el of overlayElements) {
            el.classList.remove('visible');
        }
    }

    function showOverlaysFromPointer() {
        for (const el of overlayElements) {
            el.classList.add('visible');
        }
        if (overlayFadeTimer) {
            clearTimeout(overlayFadeTimer);
        }
        overlayFadeTimer = setTimeout(() => {
            overlayFadeTimer = null;
            hideOverlays();
        }, 2500);
    }

    function getRenderScale() {
        return isFullscreen() ? 1 : 0.5;
    }

    function makeStaticGrainDataUrl(size = 128, seed = 1337) {
        const canvas = document.createElement('canvas');
        canvas.width = size;
        canvas.height = size;
        const ctx = canvas.getContext('2d', { alpha: true });
        const img = ctx.createImageData(size, size);
        let s = seed >>> 0;
        const rand = () => {
            s = (s * 1664525 + 1013904223) >>> 0;
            return (s >>> 24) / 255;
        };
        for (let i = 0; i < img.data.length; i += 4) {
            const v = Math.floor(100 + rand() * 120);
            const a = Math.floor(OVERLAY_TUNING.grainMinAlpha + rand() * OVERLAY_TUNING.grainAlphaRange);
            img.data[i] = v;
            img.data[i + 1] = v;
            img.data[i + 2] = v;
            img.data[i + 3] = a;
        }
        ctx.putImageData(img, 0, 0);
        return canvas.toDataURL('image/png');
    }

    function resize() {
        const cssW = Math.max(320, container.clientWidth || window.innerWidth || 320);
        const cssH = Math.max(240, container.clientHeight || window.innerHeight || 240);
        const dpr = Math.max(1, window.devicePixelRatio || 1);
        const scale = getRenderScale();

        let renderW = Math.max(1, Math.floor(cssW * dpr * scale));
        let renderH = Math.max(1, Math.floor(cssH * dpr * scale));
        const maxSide = Math.max(renderW, renderH);
        if (maxSide > MAX_RENDER_SIDE) {
            const clampScale = MAX_RENDER_SIDE / maxSide;
            renderW = Math.max(1, Math.floor(renderW * clampScale));
            renderH = Math.max(1, Math.floor(renderH * clampScale));
        }

        renderer.setSize(renderW, renderH, false);
        renderer.domElement.style.width = `${cssW}px`;
        renderer.domElement.style.height = `${cssH}px`;
        renderer.setViewport(0, 0, renderW, renderH);
        renderer.setScissor(0, 0, renderW, renderH);
        renderer.setScissorTest(false);

        if (crtPost.ready) {
            crtPost.sceneTarget.setSize(renderW, renderH);
            crtPost.lottesTarget.setSize(renderW, renderH);

            crtPost.lottesMaterial.uniforms.uTextureSize.value.set(renderW, renderH);
            crtPost.lottesMaterial.uniforms.uInputSize.value.set(renderW, renderH);
            crtPost.lottesMaterial.uniforms.uOutputSize.value.set(renderW, renderH);
            crtPost.lottesMaterial.uniforms.uInvTextureSize.value.set(1 / renderW, 1 / renderH);

            crtPost.zfastMaterial.uniforms.uTextureSize.value.set(renderW, renderH);
            crtPost.zfastMaterial.uniforms.uInvTextureSize.value.set(1 / renderW, 1 / renderH);
        }

        camera.aspect = cssW / cssH;
        camera.clearViewOffset();
        camera.updateProjectionMatrix();
    }

    function startNewMaze(seed, options = {}) {
        if (options?.resetLevel) {
            state.mazeLevel = 1;
        } else if (options?.advanceLevel) {
            state.mazeLevel = Math.max(1, state.mazeLevel + 1);
        } else {
            state.mazeLevel = Math.max(1, state.mazeLevel || 1);
        }
        const side = getMazeSideForLevel(state.mazeLevel);
        state.cols = side;
        state.rows = side;
        reseed(seed);
        chooseStyleProfile();
        generateMaze();
        setupObjectiveAndInteractables();
        buildGeometry();
        updateCameraFromState();
        notifySessionRestart();
    }

    function handleMessage(event) {
        const data = event.data;
        if (!data || typeof data !== 'object') return;

        if (data.type === 'MAZE_INIT') {
            startNewMaze(Number(data.game?.seed) || Math.floor(Math.random() * 1000000000) + 1, { resetLevel: true });
            return;
        }

        if (data.type === 'EJS_INPUT_TAP') {
            handleControl(data.index, 1);
            return;
        }

        if (data.type === 'EJS_INPUT_SET') {
            handleControl(data.index, data.value);
            return;
        }

        if (data.type === 'SHADER_SETTINGS_UPDATE') {
            if (crtPost.zfastMaterial && crtPost.zfastMaterial.uniforms) {
                if (data.shaderScanlineStrength !== undefined) {
                    crtPost.zfastMaterial.uniforms.uScanlineStrength.value = data.shaderScanlineStrength;
                }
                if (data.shaderDitherStrength !== undefined) {
                    crtPost.zfastMaterial.uniforms.uDitherStrength.value = data.shaderDitherStrength;
                }
                if (data.shaderColorSteps !== undefined) {
                    crtPost.zfastMaterial.uniforms.uColorSteps.value = data.shaderColorSteps;
                }
                if (data.shaderVignette !== undefined) {
                    crtPost.zfastMaterial.uniforms.uVignette.value = data.shaderVignette;
                }
            }
            if (data.shaderVignette !== undefined) {
                OVERLAY_TUNING.vignetteAlpha = data.shaderVignette;
                fxOverlay.style.setProperty('--fx-vignette-alpha', String(data.shaderVignette));
            }
            return;
        }
    }

    function animate() {
        updateCameraTransition(performance.now());
        if (USE_CRT_ZFAST && crtPost.ready) {
            renderer.setRenderTarget(crtPost.sceneTarget);
            renderer.render(scene, camera);

            renderer.setRenderTarget(crtPost.lottesTarget);
            renderer.render(crtPost.lottesScene, crtPost.postCamera);

            renderer.setRenderTarget(null);
            renderer.render(crtPost.zfastScene, crtPost.postCamera);
        } else {
            renderer.render(scene, camera);
        }
        requestAnimationFrame(animate);
    }

    fsToggle.addEventListener('click', () => {
        if (!audioState.unlocked) {
            markAudioEnabled();
            void tryUnlockAudio();
        }
        toggleFullscreen();
    });
    muteToggle.addEventListener('click', () => {
        if (!audioState.unlocked) {
            markAudioEnabled();
            void tryUnlockAudio().then(() => {
                audioState.bgmMuted = !audioState.bgmMuted;
                applyBgmMuteState();
                updateMuteButton();
            });
            return;
        }
        audioState.bgmMuted = !audioState.bgmMuted;
        applyBgmMuteState();
        updateMuteButton();
    });
    container.addEventListener('pointerdown', () => {
        showOverlaysFromPointer();
        if (!audioState.unlocked) {
            markAudioEnabled();
            void tryUnlockAudio();
        }
    }, { passive: true });
    container.addEventListener('pointermove', showOverlaysFromPointer, { passive: true });
    container.addEventListener('click', showOverlaysFromPointer, { passive: true });
    container.addEventListener('touchstart', showOverlaysFromPointer, { passive: true });
    window.addEventListener('resize', resize);
    document.addEventListener('fullscreenchange', () => {
        updateFullscreenButton();
        resize();
    });
    window.addEventListener('message', handleMessage);

    document.addEventListener('keydown', (event) => {
        if (!audioState.unlocked) {
            markAudioEnabled();
            void tryUnlockAudio();
        }
        const key = event.key.toLowerCase();
        if (event.key === 'ArrowUp' || key === 'w') {
            moveForward();
            event.preventDefault();
        } else if (event.key === 'ArrowLeft' || key === 'a') {
            turnLeft();
            event.preventDefault();
        } else if (event.key === 'ArrowRight' || key === 'd') {
            turnRight();
            event.preventDefault();
        } else if (event.key === 'ArrowDown' || key === 's') {
            turnBack();
            event.preventDefault();
        } else if (event.key === 'Enter') {
            playEnterBloop();
            interact();
            event.preventDefault();
        }
    });

    updateFullscreenButton();
    updateMuteButton();
    hideOverlays();
    if (USE_CRT_ZFAST) {
        fxOverlay.style.display = 'none';
    } else {
        fxOverlay.style.display = 'block';
        fxOverlay.style.setProperty('--fx-scanline-alpha', String(OVERLAY_TUNING.scanlineDarkAlpha));
        fxOverlay.style.setProperty('--fx-vignette-alpha', String(OVERLAY_TUNING.vignetteAlpha));
    }
    initCrtPost();
    void tryUnlockAudio();
    resize();
    (async () => {
        await Promise.all([loadCustomArtworks(), loadCustomBgmTracks()]);
        updateMuteButton();
        ensureAudio();
        startNewMaze(Math.floor(Math.random() * 1000000000) + 1, { resetLevel: true });
        requestAnimationFrame(animate);
    })();
</script>
</body>
</html>
