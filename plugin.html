<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MazeGame</title>
    <style>
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #050505;
        }

        #game {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        #fsToggle {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 30;
            border: 1px solid rgba(255, 255, 255, 0.35);
            background: rgba(0, 0, 0, 0.45);
            color: #fff;
            padding: 6px 10px;
            border-radius: 8px;
            font: 600 12px/1.1 monospace;
            cursor: pointer;
        }

        #muteToggle {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 30;
            border: 1px solid rgba(255, 255, 255, 0.35);
            background: rgba(0, 0, 0, 0.45);
            color: #fff;
            padding: 6px 10px;
            border-radius: 8px;
            font: 600 12px/1.1 monospace;
            cursor: pointer;
        }

        #hint {
            position: absolute;
            left: 10px;
            bottom: 10px;
            z-index: 30;
            max-width: 75%;
            border: 1px solid rgba(255, 255, 255, 0.28);
            background: rgba(0, 0, 0, 0.4);
            color: #fff;
            padding: 6px 9px;
            border-radius: 7px;
            font: 600 12px/1.2 monospace;
        }

        .overlay-ui {
            opacity: 0;
            transition: opacity 240ms ease;
        }

        .overlay-ui.visible {
            opacity: 1;
        }

        #fxOverlay {
            position: absolute;
            inset: 0;
            z-index: 12;
            pointer-events: none;
            opacity: 1;
            background-image:
                radial-gradient(circle at 50% 50%,
                    rgba(0, 0, 0, 0) 0%,
                    rgba(0, 0, 0, 0) 25%,
                    rgba(0, 0, 0, calc(var(--fx-vignette-alpha, 0.32) * 0.18)) 50%,
                    rgba(0, 0, 0, calc(var(--fx-vignette-alpha, 0.32) * 0.52)) 75%,
                    rgba(0, 0, 0, var(--fx-vignette-alpha, 0.32)) 100%),
                repeating-linear-gradient(to bottom, rgba(0, 0, 0, var(--fx-scanline-alpha, 0.45)) 0px, rgba(0, 0, 0, var(--fx-scanline-alpha, 0.45)) 2px, rgba(0, 0, 0, 0) 2px, rgba(0, 0, 0, 0) 4px);
            background-size: 100% 100%, 100% 4px;
            background-position: center center, 0 0;
            background-repeat: no-repeat, repeat;
        }
    </style>
</head>
<body>
<div id="game">
    <div id="fxOverlay"></div>
    <button id="muteToggle" class="overlay-ui" type="button">Music</button>
    <button id="fsToggle" class="overlay-ui" type="button">Fullscreen</button>
    <div id="hint" class="overlay-ui">Objective: Find the brass key and unlock the study door.</div>
</div>

<script src="three.min.js"></script>
<script>

    const fxOverlay = document.getElementById('fxOverlay');

    const INPUT_INDEX = {

    const DIRS = [
        { x: 0, y: -1 },

    const TILE = 2.2;
    const WALL_H = 2.8;
    const EYE_H = 1.65;
    const BASE_MAZE_SIDE = 10;

    const MAX_RENDER_SIDE = 512;
    const FORWARD_TRANSITION_MS = 1000;

    const BACK_TURN_TRANSITION_MS = 1000;
    const MOVE_BOB_AMPLITUDE = 0.2;
    const USE_CRT_ZFAST = true;
    const GEOMETRY_DEBUG_NO_TEXTURES = false;
    const TEXTURE_POLICY = {

        wallpaper: false,

    };
    const GEOMETRY_PROFILE = 'full';
    const OVERLAY_TUNING = {

        vignetteAlpha: 0.7,
        scanlineDarkAlpha: 0.25,
        scanlineLightAlpha: 0,
        chromaAlpha: 0.05,
        grainMinAlpha: 10,

    };

    const STYLE_BIBLES = [
        { name: 'Ash Manor', floor: 0x4b3a2f, ceiling: 0x2d2a29, wall: 0xc4b7a7, upperWall: 0xb6ab9d, trim: 0x5a4638, woodDark: 0x463428, accent: 0x92755f, brass: 0xc4a773, keyGlow: 0xffd98d, door: 0x5f4938, practicalLight: 0xffe0bf, ambientLight: 0xa8b8ca, decay: 0.12 },
        { name: 'Wine And Brass', floor: 0x4b3432, ceiling: 0x2d2828, wall: 0xc7b4af, upperWall: 0xb4a09a, trim: 0x65413a, woodDark: 0x4d2f2a, accent: 0x926575, brass: 0xc9ab78, keyGlow: 0xffcc95, door: 0x5a3a35, practicalLight: 0xffdebc, ambientLight: 0xa4b3c7, decay: 0.11 },
        { name: 'Moss Parlor', floor: 0x454236, ceiling: 0x2b2b27, wall: 0xb8bead, upperWall: 0xa3ab9b, trim: 0x55513e, woodDark: 0x403d2d, accent: 0x6d7e63, brass: 0xbca879, keyGlow: 0xdcf7a2, door: 0x56513e, practicalLight: 0xffe1c0, ambientLight: 0xa6b8c7, decay: 0.13 },
        { name: 'Blue Gallery', floor: 0x3e424a, ceiling: 0x272a31, wall: 0xb4bcc8, upperWall: 0xa3adb9, trim: 0x495162, woodDark: 0x323b4a, accent: 0x6f85a5, brass: 0xbcaa7e, keyGlow: 0xb2e1ff, door: 0x435067, practicalLight: 0xffe2c4, ambientLight: 0xa8bcd6, decay: 0.1 },
        { name: 'Gold Drawing Room', floor: 0x4f4232, ceiling: 0x302c25, wall: 0xd0c3a8, upperWall: 0xc2b698, trim: 0x715838, woodDark: 0x584227, accent: 0xad8a51, brass: 0xd6b56f, keyGlow: 0xffe19c, door: 0x725937, practicalLight: 0xffe4c6, ambientLight: 0xb1bfcb, decay: 0.09 },
        { name: 'Velvet Smoke', floor: 0x473b42, ceiling: 0x2c2930, wall: 0xc0b5bf, upperWall: 0xb1a5b1, trim: 0x604f61, woodDark: 0x4a3a4a, accent: 0x8a6781, brass: 0xc9ac84, keyGlow: 0xf5c8ff, door: 0x5f4a62, practicalLight: 0xffdfc3, ambientLight: 0xa9b7d1, decay: 0.11 },
    ];

    let ARTWORKS = [];

    const WAINSCOT_H = 1.04;
    const WALLPAPER_H = 1.18;
    const UPPER_WALL_H = WALL_H - WAINSCOT_H - WALLPAPER_H;
    const DRESSING_SPAWN_SAFE_RADIUS = 2;
    const HALL_CENTER_CLEARANCE = 0.5;

    const state = {
        rng: 1,
        mazeSeed: 1,
        mazeLevel: 1,
        grid: [],
        cols: BASE_MAZE_SIDE,
        rows: BASE_MAZE_SIDE,
        player: { x: 1, y: 1, dir: 1 },
        objective: {
            text: 'Find the brass key and unlock the study door.',
            status: 'active',
            hint: 'Explore and press ENTER near interactable objects.',
            keyCollected: false,
            complete: false,
        },
        style: STYLE_BIBLES[0],
        styleVariant: 0,
        styleWear: 0.22,
        styleHash: '',
        styleSignature: '',
        recentStyleHashes: [],
        interactables: new Map(),
        doorCell: null,
        objectiveLayout: null,
        sceneRoot: null,
    };

    const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 3.25;
    renderer.shadowMap.enabled = false;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.setPixelRatio(1);
    container.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x252932);
    scene.fog = new THREE.Fog(0x2d323b, 18, 82);

    const camera = new THREE.PerspectiveCamera(64, 1, 0.25, 60);
    camera.rotation.order = 'YXZ';
    camera.up.set(0, 1, 0);
    scene.add(camera);

    const cameraMotion = {
        active: false,
        type: '',
        startedAt: 0,
        durationMs: 0,
        startX: 0,
        startZ: 0,
        endX: 0,
        endZ: 0,
        startYaw: 0,
        endYaw: 0,
    };

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.28);
    scene.add(ambientLight);
    const keyLight = new THREE.DirectionalLight(0xffffff, 0.38);
    keyLight.position.set(6, 9, 4);
    keyLight.castShadow = false;
    keyLight.shadow.mapSize.width = 1024;
    keyLight.shadow.mapSize.height = 1024;
    keyLight.shadow.camera.near = 0.5;
    keyLight.shadow.camera.far = 90;
    keyLight.shadow.bias = -0.0003;
    scene.add(keyLight);
    const hemiLight = new THREE.HemisphereLight(0xc8d7ea, 0x2a2421, 0.22);
    scene.add(hemiLight);

    const crtPost = {
        ready: false,
        sceneTarget: null,
        lottesTarget: null,
        postCamera: null,
        lottesScene: null,
        lottesMaterial: null,
        zfastScene: null,
        zfastMaterial: null,
    };

    function createCrtLottesMaterial(inputTexture) {
        return new THREE.ShaderMaterial({
            uniforms: {
                uSceneTex: { value: inputTexture },
                uTextureSize: { value: new THREE.Vector2(1, 1) },
                uInputSize: { value: new THREE.Vector2(1, 1) },
                uOutputSize: { value: new THREE.Vector2(1, 1) },
                uInvTextureSize: { value: new THREE.Vector2(1, 1) },
                uHardScan: { value: -8.0 },
                uHardPix: { value: -3.0 },
                uWarpX: { value: 0.0 },
                uWarpY: { value: 0.0 },
                uMaskDark: { value: 0.5 },
                uMaskLight: { value: 1.5 },
                uScaleInLinearGamma: { value: 1.0 },
                uShadowMask: { value: 0.0 },
                uBrightBoost: { value: 1.0 },
                uHardBloomPix: { value: -1.5 },
                uHardBloomScan: { value: -2.0 },
                uBloomAmount: { value: 0.18 },
                uShape: { value: 2.0 },
                uOpacity: { value: 1.0 },
                uPostGain: { value: 2.4 },
            },
            vertexShader: `
                varying vec2 vUv;
                void main() {
                    vUv = uv;
                    gl_Position = vec4(position.xy, 0.0, 1.0);
                }
            `,
            fragmentShader: `
                precision highp float;
                varying vec2 vUv;
                uniform sampler2D uSceneTex;
                uniform vec2 uTextureSize;
                uniform vec2 uInputSize;
                uniform vec2 uOutputSize;
                uniform vec2 uInvTextureSize;
                uniform float uHardScan;
                uniform float uHardPix;
                uniform float uWarpX;
                uniform float uWarpY;
                uniform float uBrightBoost;
                uniform float uMaskDark;
                uniform float uMaskLight;
                uniform float uScaleInLinearGamma;
                uniform float uShadowMask;
                uniform float uHardBloomPix;
                uniform float uHardBloomScan;
                uniform float uBloomAmount;
                uniform float uShape;
                uniform float uOpacity;
                uniform float uPostGain;

                float toLinear1(float c) {
                    if (uScaleInLinearGamma == 0.0) return c;
                    return (c <= 0.04045) ? (c / 12.92) : pow((c + 0.055) / 1.055, 2.4);
                }

                vec3 toLinear(vec3 c) {
                    if (uScaleInLinearGamma == 0.0) return c;
                    return vec3(toLinear1(c.r), toLinear1(c.g), toLinear1(c.b));
                }

                float toSrgb1(float c) {
                    if (uScaleInLinearGamma == 0.0) return c;
                    return (c < 0.0031308) ? (c * 12.92) : (1.055 * pow(c, 0.41666) - 0.055);
                }

                vec3 toSrgb(vec3 c) {
                    if (uScaleInLinearGamma == 0.0) return c;
                    return vec3(toSrgb1(c.r), toSrgb1(c.g), toSrgb1(c.b));
                }

                vec2 dist(vec2 pos) {
                    pos = pos * uTextureSize;
                    return -((pos - floor(pos)) - vec2(0.5));
                }

                float gaus(float pos, float scale) {
                    return exp2(scale * pow(abs(pos), uShape));
                }

                vec3 fetch(vec2 pos, vec2 off) {
                    vec2 uv = (floor(pos * uTextureSize + off) + vec2(0.5)) / uTextureSize;
                    return toLinear(uBrightBoost * texture2D(uSceneTex, uv).rgb);
                }

                vec3 horz3(vec2 pos, float off) {
                    vec3 b = fetch(pos, vec2(-1.0, off));
                    vec3 c = fetch(pos, vec2( 0.0, off));
                    vec3 d = fetch(pos, vec2( 1.0, off));
                    float dx = dist(pos).x;
                    float wb = gaus(dx - 1.0, uHardPix);
                    float wc = gaus(dx + 0.0, uHardPix);
                    float wd = gaus(dx + 1.0, uHardPix);
                    return (b * wb + c * wc + d * wd) / (wb + wc + wd);
                }

                vec3 horz5(vec2 pos, float off) {
                    vec3 a = fetch(pos, vec2(-2.0, off));
                    vec3 b = fetch(pos, vec2(-1.0, off));
                    vec3 c = fetch(pos, vec2( 0.0, off));
                    vec3 d = fetch(pos, vec2( 1.0, off));
                    vec3 e = fetch(pos, vec2( 2.0, off));
                    float dx = dist(pos).x;
                    float wa = gaus(dx - 2.0, uHardPix);
                    float wb = gaus(dx - 1.0, uHardPix);
                    float wc = gaus(dx + 0.0, uHardPix);
                    float wd = gaus(dx + 1.0, uHardPix);
                    float we = gaus(dx + 2.0, uHardPix);
                    return (a * wa + b * wb + c * wc + d * wd + e * we) / (wa + wb + wc + wd + we);
                }

                vec3 horz7(vec2 pos, float off) {
                    vec3 a = fetch(pos, vec2(-3.0, off));
                    vec3 b = fetch(pos, vec2(-2.0, off));
                    vec3 c = fetch(pos, vec2(-1.0, off));
                    vec3 d = fetch(pos, vec2( 0.0, off));
                    vec3 e = fetch(pos, vec2( 1.0, off));
                    vec3 f = fetch(pos, vec2( 2.0, off));
                    vec3 g = fetch(pos, vec2( 3.0, off));
                    float dx = dist(pos).x;
                    float wa = gaus(dx - 3.0, uHardBloomPix);
                    float wb = gaus(dx - 2.0, uHardBloomPix);
                    float wc = gaus(dx - 1.0, uHardBloomPix);
                    float wd = gaus(dx + 0.0, uHardBloomPix);
                    float we = gaus(dx + 1.0, uHardBloomPix);
                    float wf = gaus(dx + 2.0, uHardBloomPix);
                    float wg = gaus(dx + 3.0, uHardBloomPix);
                    return (a * wa + b * wb + c * wc + d * wd + e * we + f * wf + g * wg) / (wa + wb + wc + wd + we + wf + wg);
                }

                float scan(vec2 pos, float off) {
                    return gaus(dist(pos).y + off, uHardScan);
                }

                float bloomScan(vec2 pos, float off) {
                    return gaus(dist(pos).y + off, uHardBloomScan);
                }

                vec3 tri(vec2 pos) {
                    vec3 a = horz3(pos, -1.0);
                    vec3 b = horz5(pos,  0.0);
                    vec3 c = horz3(pos,  1.0);
                    float wa = scan(pos, -1.0);
                    float wb = scan(pos,  0.0);
                    float wc = scan(pos,  1.0);
                    return a * wa + b * wb + c * wc;
                }

                vec3 bloom(vec2 pos) {
                    vec3 a = horz5(pos, -2.0);
                    vec3 b = horz7(pos, -1.0);
                    vec3 c = horz7(pos,  0.0);
                    vec3 d = horz7(pos,  1.0);
                    vec3 e = horz5(pos,  2.0);
                    float wa = bloomScan(pos, -2.0);
                    float wb = bloomScan(pos, -1.0);
                    float wc = bloomScan(pos,  0.0);
                    float wd = bloomScan(pos,  1.0);
                    float we = bloomScan(pos,  2.0);
                    return a * wa + b * wb + c * wc + d * wd + e * we;
                }

                vec2 warp(vec2 pos) {
                    pos = pos * 2.0 - 1.0;
                    pos *= vec2(1.0 + (pos.y * pos.y) * uWarpX, 1.0 + (pos.x * pos.x) * uWarpY);
                    return pos * 0.5 + 0.5;
                }

                vec3 mask(vec2 pos) {
                    vec3 m = vec3(uMaskDark);

                    if (uShadowMask == 1.0) {
                        float line = uMaskLight;
                        float odd = 0.0;
                        if (fract(pos.x * 0.166666666) < 0.5) odd = 1.0;
                        if (fract((pos.y + odd) * 0.5) < 0.5) line = uMaskDark;
                        pos.x = fract(pos.x * 0.333333333);
                        if (pos.x < 0.333) m.r = uMaskLight;
                        else if (pos.x < 0.666) m.g = uMaskLight;
                        else m.b = uMaskLight;
                        m *= line;
                    } else if (uShadowMask == 2.0) {
                        pos.x = fract(pos.x * 0.333333333);
                        if (pos.x < 0.333) m.r = uMaskLight;
                        else if (pos.x < 0.666) m.g = uMaskLight;
                        else m.b = uMaskLight;
                    } else if (uShadowMask == 3.0) {
                        pos.x += pos.y * 3.0;
                        pos.x = fract(pos.x * 0.166666666);
                        if (pos.x < 0.333) m.r = uMaskLight;
                        else if (pos.x < 0.666) m.g = uMaskLight;
                        else m.b = uMaskLight;
                    } else if (uShadowMask == 4.0) {
                        pos = floor(pos * vec2(1.0, 0.5));
                        pos.x += pos.y * 3.0;
                        pos.x = fract(pos.x * 0.166666666);
                        if (pos.x < 0.333) m.r = uMaskLight;
                        else if (pos.x < 0.666) m.g = uMaskLight;
                        else m.b = uMaskLight;
                    }

                    return m;
                }

                void main() {
                    vec3 original = texture2D(uSceneTex, vUv).rgb;

                    vec2 pos = warp(vUv * (uTextureSize / uInputSize)) * (uInputSize / uTextureSize);
                    vec3 outColor = tri(pos);
                    outColor += bloom(pos) * uBloomAmount;
                    if (uShadowMask > 0.0) {
                        outColor *= mask(gl_FragCoord.xy * 1.000001);
                    }

                    if (pos.x <= 0.0001 || pos.x >= 0.9999 || pos.y <= 0.0001 || pos.y >= 0.9999) {
                        outColor = vec3(0.0);
                    }

                    vec3 crtColor = toSrgb(outColor) * max(0.0, uPostGain);
                    gl_FragColor = vec4(mix(original, crtColor, clamp(uOpacity, 0.0, 1.0)), 1.0);
                }
            `,
            depthWrite: false,
            depthTest: false,
            toneMapped: false,
        });
    }

    function createCrtZfastOverlayMaterial(inputTexture) {
        return new THREE.ShaderMaterial({
            uniforms: {
                uSceneTex: { value: inputTexture },
                uTextureSize: { value: new THREE.Vector2(1, 1) },
                uInvTextureSize: { value: new THREE.Vector2(1, 1) },
                uBlurScaleX: { value: 0.30 },
                uLowLumScan: { value: 6.0 },
                uHiLumScan: { value: 8.0 },
                uScanOpacity: { value: 1.0 },
                uScanlineStrength: { value: 0.225 },
                uColorSteps: { value: 32.0 },
                uDitherStrength: { value: 0.8 },
                uVignette: { value: 0.7 },
            },
            vertexShader: `
                varying vec2 vUv;
                void main() {
                    vUv = uv;
                    gl_Position = vec4(position.xy, 0.0, 1.0);
                }
            `,
            fragmentShader: `
                precision highp float;
                varying vec2 vUv;
                uniform sampler2D uSceneTex;
                uniform vec2 uTextureSize;
                uniform vec2 uInvTextureSize;
                uniform float uBlurScaleX;
                uniform float uLowLumScan;
                uniform float uHiLumScan;
                uniform float uScanOpacity;
                uniform float uScanlineStrength;
                uniform float uColorSteps;
                uniform float uDitherStrength;
                uniform float uVignette;

                float bayer4(vec2 p) {
                    vec2 f = mod(floor(p), 4.0);
                    if (f.y < 0.5) {
                        if (f.x < 0.5) return 0.0 / 16.0;
                        if (f.x < 1.5) return 8.0 / 16.0;
                        if (f.x < 2.5) return 2.0 / 16.0;
                        return 10.0 / 16.0;
                    }
                    if (f.y < 1.5) {
                        if (f.x < 0.5) return 12.0 / 16.0;
                        if (f.x < 1.5) return 4.0 / 16.0;
                        if (f.x < 2.5) return 14.0 / 16.0;
                        return 6.0 / 16.0;
                    }
                    if (f.y < 2.5) {
                        if (f.x < 0.5) return 3.0 / 16.0;
                        if (f.x < 1.5) return 11.0 / 16.0;
                        if (f.x < 2.5) return 1.0 / 16.0;
                        return 9.0 / 16.0;
                    }
                    if (f.x < 0.5) return 15.0 / 16.0;
                    if (f.x < 1.5) return 7.0 / 16.0;
                    if (f.x < 2.5) return 13.0 / 16.0;
                    return 5.0 / 16.0;
                }

                void main() {
                    vec2 p = vUv * uTextureSize;
                    vec2 i = floor(p) + 0.50;
                    vec2 f = p - i;
                    p = (i + 4.0 * f * f * f) * uInvTextureSize;
                    p.x = mix(p.x, vUv.x, uBlurScaleX);

                    float yTerm = f.y * f.y;
                    float yyTerm = yTerm * yTerm;
                    vec3 original = texture2D(uSceneTex, vUv).rgb;
                    vec3 color = texture2D(uSceneTex, p).rgb;

                    float scanLineWeight = 1.25 - uLowLumScan * (yTerm - 2.05 * yyTerm);
                    float scanLineWeightB = 1.0 - uHiLumScan * (yyTerm - 2.8 * yyTerm * yTerm);
                    float weightLuma = dot(color, vec3(0.26664));
                    float finalWeight = mix(scanLineWeight, scanLineWeightB, weightLuma);
                    vec3 zfastScan = color * finalWeight;

                    float lineBand = mod(floor(gl_FragCoord.y), 2.0);
                    float hardScanMask = (lineBand < 1.0) ? (1.0 - clamp(uScanlineStrength, 0.0, 0.95)) : 1.0;
                    zfastScan *= hardScanMask;

                    float steps = max(2.0, uColorSteps);
                    float d = (bayer4(gl_FragCoord.xy) - 0.5) * (uDitherStrength / steps);
                    zfastScan = floor((zfastScan + d) * steps) / steps;

                    // Vignette
                    float dist = length(vUv - 0.5);
                    float vignette = smoothstep(0.8, 0.3, dist * 1.5);
                    zfastScan *= mix(1.0, vignette, uVignette);

                    gl_FragColor = vec4(mix(original, zfastScan, clamp(uScanOpacity, 0.0, 1.0)), 1.0);
                }
            `,
            depthWrite: false,
            depthTest: false,
            toneMapped: false,
        });
    }

    function initCrtPost() {
        if (!USE_CRT_ZFAST) return;
        try {
            const sceneTarget = new THREE.WebGLRenderTarget(1, 1, {
                magFilter: THREE.LinearFilter,
                minFilter: THREE.LinearFilter,
                depthBuffer: true,
                stencilBuffer: false,
            });
            sceneTarget.texture.colorSpace = THREE.SRGBColorSpace;

            const lottesTarget = new THREE.WebGLRenderTarget(1, 1, {
                magFilter: THREE.LinearFilter,
                minFilter: THREE.LinearFilter,
                depthBuffer: false,
                stencilBuffer: false,
            });
            lottesTarget.texture.colorSpace = THREE.SRGBColorSpace;

            const postCamera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 2);
            postCamera.position.z = 1;

            const lottesScene = new THREE.Scene();
            const lottesMaterial = createCrtLottesMaterial(sceneTarget.texture);
            const lottesQuad = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), lottesMaterial);
            lottesQuad.frustumCulled = false;
            lottesScene.add(lottesQuad);

            const zfastScene = new THREE.Scene();
            const zfastMaterial = createCrtZfastOverlayMaterial(lottesTarget.texture);
            const zfastQuad = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), zfastMaterial);
            zfastQuad.frustumCulled = false;
            zfastScene.add(zfastQuad);

            crtPost.sceneTarget = sceneTarget;
            crtPost.lottesTarget = lottesTarget;
            crtPost.postCamera = postCamera;
            crtPost.lottesScene = lottesScene;
            crtPost.lottesMaterial = lottesMaterial;
            crtPost.zfastScene = zfastScene;
            crtPost.zfastMaterial = zfastMaterial;
            crtPost.ready = true;
        } catch (error) {
            crtPost.ready = false;
            console.warn('CRT Lottes init failed; using direct renderer path.', error);
        }
    }

    const audioState = {
        unlocked: false,
        userEnabled: true,
        bgmAudio: null,
        bgmOrder: [],
        bgmIndex: 0,
        bgmVolume: 0.72,
        bgmMuted: false,
        sfxVolume: 1,
        sfx: {
            footsteps: [
                'audio/sfx/footsteps-loop-a.mp3',
                'audio/sfx/footsteps-loop-b.mp3',
                'audio/sfx/footsteps-loop-c.mp3',
            ],
            key: ['audio/sfx/key-pickup.mp3'],
            door: ['audio/sfx/door-open.mp3'],
        },
        bgmTracks: [],
    };

    function shuffleArray(items) {
        const arr = items.slice();
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            const t = arr[i];
            arr[i] = arr[j];
            arr[j] = t;
        }
        return arr;
    }

    function createAudio(path) {
        const audio = new Audio(path);
        audio.preload = 'auto';
        return audio;
    }

    function ensureAudio() {
        if (!audioState.bgmTracks.length) {
            audioState.bgmOrder = [];
            audioState.bgmAudio = null;
            return true;
        }
        if (!audioState.bgmOrder.length) {
            audioState.bgmOrder = shuffleArray(audioState.bgmTracks);
            audioState.bgmIndex = 0;
        }
        if (!audioState.bgmAudio && audioState.bgmOrder.length) {
            const src = audioState.bgmOrder[audioState.bgmIndex % audioState.bgmOrder.length];
            audioState.bgmAudio = createAudio(src);
            audioState.bgmAudio.loop = false;
            audioState.bgmAudio.volume = 0;
            audioState.bgmAudio.addEventListener('ended', () => {
                if (!audioState.unlocked) return;
                playNextBgmTrack();
            });
        }
        return true;
    }

    async function tryUnlockAudio() {
        if (audioState.unlocked) return true;
        if (!audioState.userEnabled) return false;
        if (!ensureAudio()) return false;
        try {
            const bgm = audioState.bgmAudio;
            if (bgm) {
                bgm.volume = 0;
                await bgm.play();
                bgm.pause();
                bgm.currentTime = 0;
            }

            const primer = createAudio(audioState.sfx.footsteps[0]);
            primer.volume = 0;
            await primer.play();
            primer.pause();

            audioState.unlocked = true;
            startMusicLoop();
            return true;
        } catch {
            audioState.unlocked = false;
            return false;
        }
    }

    function fadeTo(audio, target, durationMs) {
        if (!audio) return;
        const steps = Math.max(1, Math.floor(durationMs / 60));
        const start = audio.volume;
        const delta = (target - start) / steps;
        let n = 0;
        const timer = setInterval(() => {
            n += 1;
            audio.volume = Math.max(0, Math.min(1, start + delta * n));
            if (n >= steps) {
                clearInterval(timer);
                audio.volume = target;
            }
        }, 60);
    }

    function playNextBgmTrack() {
        if (!audioState.unlocked || !audioState.bgmOrder.length) return;
        audioState.bgmIndex = (audioState.bgmIndex + 1) % audioState.bgmOrder.length;
        const src = audioState.bgmOrder[audioState.bgmIndex];
        if (!audioState.bgmAudio) {
            audioState.bgmAudio = createAudio(src);
        }
        const bgm = audioState.bgmAudio;
        bgm.src = src;
        bgm.currentTime = 0;
        bgm.volume = 0;
        const p = bgm.play();
        if (p && typeof p.then === 'function') {
            p.then(() => {
                const target = audioState.bgmMuted ? 0 : Math.min(1, audioState.bgmVolume);
                fadeTo(bgm, target, 1600);
            }).catch(() => {});
        }
    }

    function markAudioEnabled() {
        audioState.userEnabled = true;
    }

    function playTransientClip(src, volume = 1, maxMs = 900, rate = 1) {
        if (!audioState.unlocked) return;
        const clip = createAudio(src);
        clip.volume = Math.max(0, Math.min(1, volume * audioState.sfxVolume));
        clip.playbackRate = rate;
        const p = clip.play();
        if (p && typeof p.then === 'function') {
            p.catch(() => {});
        }
        setTimeout(() => {
            clip.pause();
            clip.currentTime = 0;
        }, maxMs);
    }

    function playFootstep() {
        if (!audioState.unlocked) return;
        const list = audioState.sfx.footsteps;
        const src = list[Math.floor(Math.random() * list.length)];
        const rate = 0.94 + Math.random() * 0.16;
        playTransientClip(src, 0.95, 920, rate);
    }

    function playKeyPickup() {
        if (!audioState.unlocked) return;
        playTransientClip(audioState.sfx.key[0], 1, 1200, 1);
    }

    function playDoorOpen() {
        if (!audioState.unlocked) return;
        playTransientClip(audioState.sfx.door[0], 0.92, 2400, 1);
    }

    function startMusicLoop() {
        if (!audioState.unlocked) return;
        ensureAudio();
        const bgm = audioState.bgmAudio;
        if (!bgm || !audioState.bgmOrder.length) return;
        if (!bgm.paused && !bgm.ended) return;
        bgm.src = audioState.bgmOrder[audioState.bgmIndex % audioState.bgmOrder.length];
        bgm.currentTime = 0;
        bgm.volume = 0;
        const p = bgm.play();
        if (p && typeof p.then === 'function') {
            p.then(() => {
                const target = audioState.bgmMuted ? 0 : Math.min(1, audioState.bgmVolume);
                fadeTo(bgm, target, 2000);
            }).catch(() => {});
        }
    }

    function applyBgmMuteState() {
        const bgm = audioState.bgmAudio;
        if (!bgm) return;
        bgm.volume = audioState.bgmMuted ? 0 : Math.min(1, audioState.bgmVolume);
    }

    function updateMuteButton() {
        if (!audioState.bgmTracks.length) {
            muteToggle.textContent = 'No Music';
            muteToggle.disabled = true;
            return;

        muteToggle.textContent = audioState.bgmMuted ? 'Music Off' : 'Music On';

    function setShadowFlags(mesh, cast, receive) {
        mesh.castShadow = false;

    class Interactable {
        constructor({ id, type, x, y, faceDir = null, state = 'active', requires = null, telegraph = null, onInteract = null }) {
            this.id = id;
            this.type = type;
            this.x = x;
            this.y = y;
            this.faceDir = Number.isInteger(faceDir) ? ((faceDir % 4) + 4) % 4 : null;
            this.state = state;
            this.requires = requires;
            this.telegraph = telegraph;
            this.onInteract = onInteract;
        }

        canInteract(game) {
            if (this.state !== 'active') return false;
            if (!this.requires) return true;
            if (this.requires === 'key') return game.objective.keyCollected;
            return true;
        }

        interact(game) {
            if (!this.canInteract(game)) return false;
            if (typeof this.onInteract === 'function') {
                this.onInteract(game, this);
                return true;
            }
            return false;
        }
    }

    function reseed(seed) {
        const n = (Number(seed) >>> 0) || 1;
        state.rng = n;
        state.mazeSeed = n;
    }

    function randInt(max) {
        state.rng = (1664525 * state.rng + 1013904223) >>> 0;
        return state.rng % max;
    }

    function hash32(a, b, c, d) {
        let x = (Math.imul(a ^ 0x9e3779b9, 2246822519) + Math.imul(b ^ 0x85ebca6b, 3266489917) + Math.imul(c ^ 0xc2b2ae35, 668265263) + (d >>> 0)) >>> 0;
        x ^= x >>> 16;
        x = Math.imul(x, 2246822519) >>> 0;
        x ^= x >>> 13;
        x = Math.imul(x, 3266489917) >>> 0;
        x ^= x >>> 16;
        return x >>> 0;
    }

    const wallpaperCache = new Map();

    function getGlowSpriteTexture() {
        if (glowSpriteTexture) return glowSpriteTexture;
        const canvas = document.createElement('canvas');
        canvas.width = 128;
        canvas.height = 128;
        const ctx = canvas.getContext('2d', { alpha: true });
        const grad = ctx.createRadialGradient(64, 64, 8, 64, 64, 64);
        grad.addColorStop(0, 'rgba(255,255,255,0.95)');
        grad.addColorStop(0.22, 'rgba(255,255,255,0.55)');
        grad.addColorStop(0.58, 'rgba(255,255,255,0.16)');
        grad.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.clearRect(0, 0, 128, 128);
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, 128, 128);

        glowSpriteTexture = new THREE.CanvasTexture(canvas);
        glowSpriteTexture.colorSpace = THREE.SRGBColorSpace;
        glowSpriteTexture.minFilter = THREE.LinearFilter;
        glowSpriteTexture.magFilter = THREE.LinearFilter;
        glowSpriteTexture.generateMipmaps = false;
        glowSpriteTexture.wrapS = THREE.ClampToEdgeWrapping;
        glowSpriteTexture.wrapT = THREE.ClampToEdgeWrapping;
        return glowSpriteTexture;
    }

    function resolveAssetUrl(path) {
        try {
            return new URL(path, window.location.href).toString();
        } catch {
            return path;
        }
    }

    function getArtworkTexture(file) {
        if (!TEXTURE_POLICY.artwork) return null;
        const url = resolveAssetUrl(file);
        if (artTextureCache.has(url)) return artTextureCache.get(url);

        const tex = textureLoader.load(url, undefined, undefined, () => {
            console.warn('MazeGame artwork failed to load:', url);
        });
        tex.colorSpace = THREE.SRGBColorSpace;
        tex.wrapS = THREE.ClampToEdgeWrapping;
        tex.wrapT = THREE.ClampToEdgeWrapping;
        tex.generateMipmaps = true;
        tex.minFilter = THREE.LinearMipmapLinearFilter;
        tex.magFilter = THREE.LinearFilter;
        artTextureCache.set(url, tex);
        return tex;
    }

    function shuffledArtworkList() {
        const list = ARTWORKS.slice();
        for (let i = list.length - 1; i > 0; i--) {
            const j = hash32(state.mazeSeed, state.styleVariant, i, 9917) % (i + 1);
            const tmp = list[i];
            list[i] = list[j];
            list[j] = tmp;
        }
        return list;
    }

    async function loadJsonFileList(manifestPath) {
        try {
            const manifestUrl = resolveAssetUrl(manifestPath);
            const res = await fetch(manifestUrl, { cache: 'no-store' });
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            if (Array.isArray(data)) return data.map(x => String(x || '')).filter(Boolean);
            return Array.isArray(data?.files) ? data.files.map(x => String(x || '')).filter(Boolean) : [];
        } catch {
            return [];
        }
    }

    async function loadCustomArtworks() {
        const files = await loadJsonFileList('art/custom/index.json');
        ARTWORKS = files.map((file, i) => ({ id: `custom-${i}`, file }));
    }

        const files = await loadJsonFileList('audio/custom-bgm/index.json');
        audioState.bgmTracks = files;
        audioState.bgmOrder = [];

            audioState.bgmAudio.pause();
            audioState.bgmAudio = null;
        }

    function hexToRgb(hex) {
        return {
            r: (hex >> 16) & 255,
            g: (hex >> 8) & 255,
            b: hex & 255,
        };
    }

    function shadeHex(hex, amount) {
        const c = hexToRgb(hex);
        const r = Math.max(0, Math.min(255, c.r + amount));
        const g = Math.max(0, Math.min(255, c.g + amount));
        const b = Math.max(0, Math.min(255, c.b + amount));
        return `rgb(${r}, ${g}, ${b})`;
    }

    function colorIntFromRgb(r, g, b) {
        return ((r & 255) << 16) | ((g & 255) << 8) | (b & 255);
    }

    function clampByte(n) {
        return Math.max(0, Math.min(255, n | 0));
    }

    function jitterColor(hex, seedA, seedB, range = 10) {
        const c = hexToRgb(hex);
        const h = hash32(seedA, seedB, state.mazeSeed, state.styleVariant * 97);
        const d1 = (((h & 255) / 255) * 2 - 1) * range;
        const d2 = ((((h >>> 8) & 255) / 255) * 2 - 1) * range;
        const d3 = ((((h >>> 16) & 255) / 255) * 2 - 1) * range;
        return colorIntFromRgb(clampByte(c.r + d1), clampByte(c.g + d2), clampByte(c.b + d3));
    }

    function blendHex(hexA, hexB, t) {
        const a = hexToRgb(hexA);
        const b = hexToRgb(hexB);
        const k = Math.max(0, Math.min(1, Number(t) || 0));
        const r = clampByte(a.r + (b.r - a.r) * k);
        const g = clampByte(a.g + (b.g - a.g) * k);
        const bl = clampByte(a.b + (b.b - a.b) * k);
        return colorIntFromRgb(r, g, bl);
    }

    function liftMinLuma(hex, floor = 48) {
        const c = hexToRgb(hex);
        const m = Math.max(c.r, c.g, c.b);
        if (m >= floor) return hex;
        const add = floor - m;
        return colorIntFromRgb(clampByte(c.r + add), clampByte(c.g + add), clampByte(c.b + add));
    }

    function applyStyleColorVariation(base, variantSeed, wearSeed) {
        const shift = (wearSeed - 1.5) * 3;
        return {
            ...base,
            wall: jitterColor(base.wall, variantSeed + 11, wearSeed + 31, 9),
            upperWall: jitterColor(base.upperWall, variantSeed + 23, wearSeed + 41, 8),
            trim: jitterColor(base.trim, variantSeed + 37, wearSeed + 53, 7),
            woodDark: jitterColor(base.woodDark, variantSeed + 47, wearSeed + 67, 7),
            accent: jitterColor(base.accent, variantSeed + 61, wearSeed + 79, 13),
            floor: jitterColor(base.floor, variantSeed + 71, wearSeed + 83, 6),
            ceiling: jitterColor(base.ceiling, variantSeed + 89, wearSeed + 97, 4),
            brass: jitterColor(base.brass, variantSeed + 101, wearSeed + 109, 8),
            practicalLight: blendHex(base.practicalLight, 0xffffff, 0.06 + shift * 0.005),
            ambientLight: blendHex(base.ambientLight, 0xb8c8da, 0.08 + shift * 0.004),
            door: jitterColor(base.door, variantSeed + 113, wearSeed + 127, 8),
            keyGlow: jitterColor(base.keyGlow, variantSeed + 131, wearSeed + 149, 10),
        };
    }

    function makeCanvasTexture(draw, w = 256, h = 256) {
        const c = document.createElement('canvas');
        c.width = w;
        c.height = h;
        const g = c.getContext('2d');
        draw(g, w, h);
        const tex = new THREE.CanvasTexture(c);
        tex.colorSpace = THREE.SRGBColorSpace;
        tex.wrapS = THREE.RepeatWrapping;
        tex.wrapT = THREE.RepeatWrapping;
        return tex;
    }

    function makeLinearCanvasTexture(draw, w = 256, h = 256) {
        const c = document.createElement('canvas');
        c.width = w;
        c.height = h;
        const g = c.getContext('2d');
        draw(g, w, h);
        const tex = new THREE.CanvasTexture(c);
        tex.wrapS = THREE.RepeatWrapping;
        tex.wrapT = THREE.RepeatWrapping;
        return tex;
    }

    function getZoneId(x, y) {
        const zx = Math.floor(x / 4);
        const zy = Math.floor(y / 4);
        return `${zx}:${zy}`;
    }

    function getWallpaperTexture(style, family, variant, orientTag, zoneVariant) {
        if (!TEXTURE_POLICY.wallpaper) return null;
        const key = `${style.name}-${family}-${variant}-${orientTag}-${zoneVariant}`;
        if (wallpaperCache.has(key)) return wallpaperCache.get(key);

        const tex = makeCanvasTexture((g, w, h) => {
            g.fillStyle = shadeHex(style.wall, 8 + zoneVariant * 3);
            g.fillRect(0, 0, w, h);

            const dark = shadeHex(style.wall, -16);
            const light = shadeHex(style.wall, 24);
            const accent = shadeHex(style.accent, -5);
            const trimTone = shadeHex(style.trim, 2);

            if (family === 0) { // faded damask medallions
                g.fillStyle = light;
                for (let y = 16; y < h; y += 32) {
                    for (let x = 16; x < w; x += 32) {
                        const r = 3 + ((x + y + variant) % 3);
                        g.beginPath();
                        g.arc(x, y, r, 0, Math.PI * 2);
                        g.fill();
                        g.beginPath();
                        g.arc(x, y, r + 4, 0, Math.PI * 2);
                        g.strokeStyle = accent;
                        g.lineWidth = 1;
                        g.stroke();
                    }
                }
            } else if (family === 1) { // fleur vines
                g.strokeStyle = dark;
                g.lineWidth = 2;
                for (let y = 10; y < h; y += 28) {
                    for (let x = 12; x < w; x += 24) {
                        g.beginPath();
                        g.arc(x, y, 6, 0, Math.PI);
                        g.stroke();
                        g.beginPath();
                        g.arc(x + 12, y + 14, 6, Math.PI, Math.PI * 2);
                        g.stroke();
                        g.beginPath();
                        g.moveTo(x + 6, y + 4);
                        g.lineTo(x + 12, y + 12);
                        g.stroke();
                    }
                }
            } else if (family === 2) { // flocked stripes
                for (let i = 0; i < w; i += 18) {
                    g.fillStyle = i % 36 === 0 ? light : dark;
                    g.fillRect(i, 0, 8, h);
                    g.fillStyle = accent;
                    g.globalAlpha = 0.24;
                    g.fillRect(i + 8, 0, 2, h);
                    g.globalAlpha = 1;
                }
            } else if (family === 3) { // brocade diamonds
                g.strokeStyle = accent;
                g.lineWidth = 1.5;
                for (let y = 16; y < h; y += 22) {
                    for (let x = 16; x < w; x += 22) {
                        g.beginPath();
                        g.moveTo(x, y - 6);
                        g.lineTo(x + 6, y);
                        g.lineTo(x, y + 6);
                        g.lineTo(x - 6, y);
                        g.closePath();
                        g.stroke();
                    }
                }
            } else if (family === 4) { // embossed rosettes
                g.strokeStyle = trimTone;
                g.lineWidth = 1.5;
                for (let y = 18; y < h; y += 28) {
                    for (let x = 18; x < w; x += 28) {
                        g.beginPath();
                        g.arc(x, y, 8, 0, Math.PI * 2);
                        g.stroke();
                        g.beginPath();
                        g.arc(x, y, 3, 0, Math.PI * 2);
                        g.stroke();
                    }
                }
            } else { // fan lattice
                g.strokeStyle = light;
                g.lineWidth = 1.5;
                for (let x = -h; x < w; x += 22) {
                    g.beginPath();
                    g.moveTo(x, 0);
                    g.lineTo(x + h, h);
                    g.stroke();
                    g.beginPath();
                    g.moveTo(x + h * 0.84, 0);
                    g.lineTo(x + h * 0.18, h);
                    g.stroke();
                }
            }

            const grime = g.createLinearGradient(0, 0, 0, h);
            grime.addColorStop(0, 'rgba(255,255,255,0)');
            grime.addColorStop(0.66, 'rgba(0,0,0,0.02)');
            grime.addColorStop(1, 'rgba(0,0,0,0.08)');
            g.fillStyle = grime;
            g.fillRect(0, 0, w, h);

            const decay = Math.max(0.06, Math.min(0.2, (style.decay || 0.11) + (state.styleWear || 0.1) * 0.6));
            g.globalAlpha = decay * 0.55;
            g.fillStyle = '#000';
            for (let i = 0; i < 420; i++) {
                const x = (i * 73 + variant * 17 + zoneVariant * 11) % w;
                const y = (i * 37 + variant * 29 + zoneVariant * 19) % h;
                g.fillRect(x, y, 1, 1);
            }
            g.globalAlpha = decay * 0.3;
            for (let i = 0; i < 18; i++) {
                const y = (i * 31 + variant * 27 + zoneVariant * 13) % h;
                g.fillRect(0, y, w, 1);
            }
            g.globalAlpha = 1;
        });

        const rot = ((variant + orientTag) % 4) * (Math.PI / 2);
        tex.center.set(0.5, 0.5);
        tex.rotation = rot;
        tex.repeat.set(1.2, 1.2);
        wallpaperCache.set(key, tex);
        return tex;
    }

    function getWallpaperNormalTexture(cellX, cellY, style, family, variant, orientTag, zoneVariant) {
        if (!TEXTURE_POLICY.wallpaper) return null;
        const key = `${style.name}-${family}-${variant}-${orientTag}-${zoneVariant}-${cellX % 16}-${cellY % 16}`;
        if (wallpaperNormalCache.has(key)) return wallpaperNormalCache.get(key);
        const tex = makeLinearCanvasTexture((g, w, h) => {
            g.fillStyle = 'rgb(128,128,255)';
            g.fillRect(0, 0, w, h);
            g.globalAlpha = 0.2;
            for (let i = 0; i < 180; i++) {
                const x = (i * 17 + variant * 13 + zoneVariant * 19 + (cellX * 11) + (cellY * 7)) % w;
                const y = (i * 31 + family * 23 + orientTag * 11 + (cellX * 5) + (cellY * 3)) % h;
                g.fillStyle = i % 2 ? 'rgb(136,120,255)' : 'rgb(120,136,255)';
                g.fillRect(x, y, 2, 1);
            }
            g.globalAlpha = 1;
        }, 128, 128);
        tex.repeat.set(1.2, 1.2);
        wallpaperNormalCache.set(key, tex);

    function placeAgingDecals(root) {
        const decalGeom = new THREE.PlaneGeometry(0.44, 0.3);
        const style = state.style;
        let spawned = 0;
        const maxDecals = 18;
        for (let y = 1; y < state.rows - 1 && spawned < maxDecals; y++) {
            for (let x = 1; x < state.cols - 1 && spawned < maxDecals; x++) {
                if (state.grid[y][x] !== 0) continue;
                const sig = hash32(x, y, state.mazeSeed, 8119);
                if ((sig % 100) > 14) continue;
                const sides = [
                    { dx: 0, dy: -1, nx: 0, nz: -1, yaw: Math.PI },
                    { dx: 1, dy: 0, nx: 1, nz: 0, yaw: -Math.PI / 2 },
                    { dx: 0, dy: 1, nx: 0, nz: 1, yaw: 0 },
                    { dx: -1, dy: 0, nx: -1, nz: 0, yaw: Math.PI / 2 },
                ];
                const side = sides[sig % sides.length];
                if (!isWall(x + side.dx, y + side.dy)) continue;
                const p = gridToWorld(x, y);
                const wallX = p.x + side.nx * (TILE * 0.43);
                const wallZ = p.z + side.nz * (TILE * 0.43);
                const mat = new THREE.MeshBasicMaterial({
                    map: getDecalTexture(style, sig % 17),
                    color: 0xffffff,
                    transparent: true,
                    opacity: 0.42,
                    depthWrite: false,
                });
                const decal = new THREE.Mesh(decalGeom, mat);
                decal.position.set(
                    wallX - side.nx * 0.02 + ((sig >>> 4) % 7 - 3) * 0.04,
                    0.45 + ((sig >>> 9) % 8) * 0.18,
                    wallZ - side.nz * 0.02 + ((sig >>> 13) % 7 - 3) * 0.04,
                );
                decal.rotation.y = side.yaw;
                root.add(decal);
                spawned += 1;
            }
        }
    }

    function inBounds(x, y) {
        return x >= 0 && y >= 0 && x < state.cols && y < state.rows;
    }

    function isWall(x, y) {
        if (!inBounds(x, y)) return true;
        return state.grid[y][x] === 1;
    }

    function gridToWorld(x, y) {
        return {
            x: (x - state.cols / 2) * TILE + TILE * 0.5,
            z: (y - state.rows / 2) * TILE + TILE * 0.5,
        };
    }

    function dirToYaw(dir) {
        switch ((Number(dir) % 4 + 4) % 4) {
            case 0: return 0;
            case 1: return -Math.PI / 2;
            case 2: return Math.PI;
            case 3: return Math.PI / 2;
            default: return 0;
        }
    }

    function getForwardCell() {
        const d = DIRS[state.player.dir];
        return { x: state.player.x + d.x, y: state.player.y + d.y };
    }

    function isStudyDoorLockedAt(x, y) {
        const door = state.interactables.get('study_door');
        if (!door || door.state !== 'active') return false;
        return door.x === x && door.y === y;
    }

    function isWalkable(x, y) {
        if (isWall(x, y)) return false;
        if (isStudyDoorLockedAt(x, y)) return false;
        return true;
    }

    function updateCameraFromState() {
        cameraMotion.active = false;
        const p = gridToWorld(state.player.x, state.player.y);
        camera.position.set(p.x, EYE_H, p.z);
        camera.rotation.set(0, dirToYaw(state.player.dir), 0);
    }

    function isCameraTransitionActive() {
        return !!cameraMotion.active;
    }

    function startCameraTransition(type, durationMs, startPos, endPos, startYaw, endYaw) {
        cameraMotion.active = true;
        cameraMotion.type = type;
        cameraMotion.startedAt = performance.now();
        cameraMotion.durationMs = Math.max(1, Number(durationMs) || 1);
        cameraMotion.startX = startPos.x;
        cameraMotion.startZ = startPos.z;
        cameraMotion.endX = endPos.x;
        cameraMotion.endZ = endPos.z;
        cameraMotion.startYaw = startYaw;
        cameraMotion.endYaw = endYaw;
    }

    function updateCameraTransition(nowMs) {
        if (!cameraMotion.active) return;
        const tRaw = (nowMs - cameraMotion.startedAt) / cameraMotion.durationMs;
        const t = Math.max(0, Math.min(1, tRaw));
        const eased = t * t * (3 - 2 * t);
        const x = cameraMotion.startX + (cameraMotion.endX - cameraMotion.startX) * eased;
        const z = cameraMotion.startZ + (cameraMotion.endZ - cameraMotion.startZ) * eased;
        const y = EYE_H + (cameraMotion.type === 'forward' ? Math.sin(eased * Math.PI) * MOVE_BOB_AMPLITUDE : 0);
        const yaw = cameraMotion.startYaw + (cameraMotion.endYaw - cameraMotion.startYaw) * eased;

        camera.position.set(x, y, z);
        camera.rotation.set(0, yaw, 0);

        if (t >= 1) {
            cameraMotion.active = false;
            const p = gridToWorld(state.player.x, state.player.y);
            camera.position.set(p.x, EYE_H, p.z);
            camera.rotation.set(0, dirToYaw(state.player.dir), 0);
        }
    }

    function chooseStyleProfile() {
        let chosen = STYLE_BIBLES[0];
        let chosenVariant = 0;
        let chosenWear = 2;
        let chosenHash = '0-0-2';

        for (let i = 0; i < 20; i++) {
            const idx = randInt(STYLE_BIBLES.length);
            const variant = randInt(6);
            const wear = randInt(4);
            const hash = `${idx}-${variant}-${wear}`;
            if (!state.recentStyleHashes.includes(hash)) {
                chosen = STYLE_BIBLES[idx];
                chosenVariant = variant;
                chosenWear = wear;
                chosenHash = hash;
                break;
            }
        }

        state.style = applyStyleColorVariation(chosen, chosenVariant, chosenWear);
        state.styleVariant = chosenVariant;
        state.styleHash = chosenHash;
        state.styleWear = 0.12 + (chosenWear / 10);
        state.styleSignature = `${chosen.name}|v${chosenVariant}|w${chosenWear}|a${state.style.accent.toString(16)}`;
        state.recentStyleHashes.push(chosenHash);
        if (state.recentStyleHashes.length > 4) {
            state.recentStyleHashes.shift();
        }
    }

    function generateMaze() {
        state.grid = Array.from({ length: state.rows }, () => Array(state.cols).fill(1));
        const stack = [{ x: 1, y: 1 }];
        state.grid[1][1] = 0;

        while (stack.length) {
            const cur = stack[stack.length - 1];
            const dirs = [];
            for (const d of DIRS) {
                const nx = cur.x + d.x * 2;
                const ny = cur.y + d.y * 2;
                if (nx <= 0 || ny <= 0 || nx >= state.cols - 1 || ny >= state.rows - 1) continue;
                if (state.grid[ny][nx] === 1) {
                    dirs.push({ nx, ny, mx: cur.x + d.x, my: cur.y + d.y });
                }
            }
            if (!dirs.length) {
                stack.pop();
                continue;
            }
            const pick = dirs[randInt(dirs.length)];
            state.grid[pick.my][pick.mx] = 0;
            state.grid[pick.ny][pick.nx] = 0;
            stack.push({ x: pick.nx, y: pick.ny });
        }

        enforceCorridorFlow(5);
    }

    function getMazeSideForLevel(level) {
        const safeLevel = Math.max(1, Math.floor(Number(level) || 1));
        const side = BASE_MAZE_SIDE + (safeLevel - 1) * MAZE_SIDE_STEP;
        return (side % 2 === 0) ? side + 1 : side;
    }

    function isStraightVerticalCell(x, y) {
        if (state.grid[y][x] !== 0) return false;
        return !isWall(x, y - 1) && !isWall(x, y + 1) && isWall(x - 1, y) && isWall(x + 1, y);
    }

    function isStraightHorizontalCell(x, y) {
        if (state.grid[y][x] !== 0) return false;
        return !isWall(x - 1, y) && !isWall(x + 1, y) && isWall(x, y - 1) && isWall(x, y + 1);
    }

    function tryCarveSidePocket(x, y, vertical, salt) {
        const candidates = vertical ? [{ x: -1, y: 0 }, { x: 1, y: 0 }] : [{ x: 0, y: -1 }, { x: 0, y: 1 }];
        const flip = (hash32(x, y, state.mazeSeed, salt) % 2) === 1;
        const order = flip ? [1, 0] : [0, 1];

        for (const i of order) {
            const d = candidates[i];
            const tx = x + d.x;
            const ty = y + d.y;
            if (tx <= 0 || ty <= 0 || tx >= state.cols - 1 || ty >= state.rows - 1) continue;
            if (state.grid[ty][tx] !== 1) continue;
            state.grid[ty][tx] = 0;
            return true;
        }
        return false;
    }

    function processStraightRun(runCells, vertical, maxRun) {
        if (runCells.length <= maxRun) return;
        for (let i = maxRun - 1; i < runCells.length - 1; i += maxRun) {
            const c = runCells[i];
            tryCarveSidePocket(c.x, c.y, vertical, i + (vertical ? 301 : 719));
        }
    }

    function enforceCorridorFlow(maxForwardPresses) {
        const maxRun = Math.max(2, Number(maxForwardPresses) || 3);

        for (let x = 1; x < state.cols - 1; x++) {
            let run = [];
            for (let y = 1; y < state.rows - 1; y++) {
                if (isStraightVerticalCell(x, y)) {
                    run.push({ x, y });
                } else {
                    processStraightRun(run, true, maxRun);
                    run = [];
                }
            }
            processStraightRun(run, true, maxRun);
        }

        for (let y = 1; y < state.rows - 1; y++) {
            let run = [];
            for (let x = 1; x < state.cols - 1; x++) {
                if (isStraightHorizontalCell(x, y)) {
                    run.push({ x, y });
                } else {
                    processStraightRun(run, false, maxRun);
                    run = [];
                }
            }
            processStraightRun(run, false, maxRun);
        }
    }

    function bfsDistances(startX, startY) {
        const dist = Array.from({ length: state.rows }, () => Array(state.cols).fill(-1));
        const q = [{ x: startX, y: startY }];
        dist[startY][startX] = 0;
        for (let qi = 0; qi < q.length; qi++) {
            const cur = q[qi];
            for (const d of DIRS) {
                const nx = cur.x + d.x;
                const ny = cur.y + d.y;
                if (!inBounds(nx, ny) || isWall(nx, ny)) continue;
                if (dist[ny][nx] !== -1) continue;
                dist[ny][nx] = dist[cur.y][cur.x] + 1;
                q.push({ x: nx, y: ny });
            }
        }
        return dist;
    }

    function openNeighborCount(x, y) {
        let n = 0;
        for (const d of DIRS) if (!isWall(x + d.x, y + d.y)) n++;
        return n;
    }

    function getDeadEndOpenDirection(x, y) {
        for (let dir = 0; dir < DIRS.length; dir++) {
            const d = DIRS[dir];
            if (!isWall(x + d.x, y + d.y)) return dir;
        }
        return 1;
    }

    function chooseWallMountDirection(x, y, anchorX = x, anchorY = y) {
        const wallDirs = [];
        for (let dir = 0; dir < DIRS.length; dir++) {
            const d = DIRS[dir];
            if (isWall(x + d.x, y + d.y)) {
                wallDirs.push(dir);
            }
        }
        if (!wallDirs.length) return 2;

        const vx = anchorX - x;
        const vy = anchorY - y;
        let bestOpenDir = 0;
        let bestDot = -Infinity;
        for (let dir = 0; dir < DIRS.length; dir++) {
            const d = DIRS[dir];
            const dot = d.x * vx + d.y * vy;
            if (dot > bestDot) {
                bestDot = dot;
                bestOpenDir = dir;
            }
        }

        const preferredWallDir = (bestOpenDir + 2) % 4;
        if (wallDirs.includes(preferredWallDir)) return preferredWallDir;

        wallDirs.sort((a, b) => a - b);
        return wallDirs[0];
    }

    function getOpenDirections(x, y) {
        const dirs = [];
        for (let dir = 0; dir < DIRS.length; dir++) {
            const d = DIRS[dir];
            if (!isWall(x + d.x, y + d.y)) dirs.push(dir);
        }
        return dirs;
    }

    function collectAlcoveCandidates() {
        const list = [];
        for (let y = 1; y < state.rows - 1; y++) {
            for (let x = 1; x < state.cols - 1; x++) {
                if (isWall(x, y)) continue;
                const openDirs = getOpenDirections(x, y);
                if (openDirs.length !== 1) continue;
                const openDir = openDirs[0];
                list.push({
                    x,
                    y,
                    openDir,
                    faceDir: (openDir + 2) % 4,
                });
            }
        }
        return list;
    }

    function pickFarthestCandidate(candidates, distGrid, excluded, salt) {
        let best = null;
        let bestScore = -Infinity;
        for (const c of candidates) {
            const key = `${c.x},${c.y}`;
            if (excluded.has(key)) continue;
            const d = distGrid[c.y]?.[c.x] ?? -1;
            if (d < 0) continue;
            const tie = hash32(c.x, c.y, state.mazeSeed, salt) % 1000;
            const score = d * 1000 + tie;
            if (score > bestScore) {
                bestScore = score;
                best = c;
            }
        }
        return best;
    }

    function pickTargetDistanceCandidate(candidates, distGrid, excluded, salt, targetRatio = 0.6) {
        let maxD = -1;
        for (const c of candidates) {
            if (excluded.has(`${c.x},${c.y}`)) continue;
            const d = distGrid[c.y]?.[c.x] ?? -1;
            if (d > maxD) maxD = d;
        }
        if (maxD <= 0) return null;

        const target = maxD * Math.max(0.2, Math.min(0.9, Number(targetRatio) || 0.6));
        let best = null;
        let bestScore = -Infinity;
        for (const c of candidates) {
            if (excluded.has(`${c.x},${c.y}`)) continue;
            const d = distGrid[c.y]?.[c.x] ?? -1;
            if (d < 0) continue;
            const tie = hash32(c.x, c.y, state.mazeSeed, salt) % 1000;
            const score = (-Math.abs(d - target) * 1000) + (d * 10) + tie;
            if (score > bestScore) {
                bestScore = score;
                best = c;
            }
        }
        return best;
    }

    function pickFarthestWallMountCell(distGrid, excluded, anchorX, anchorY) {
        let best = null;
        let bestScore = -Infinity;
        for (let y = 1; y < state.rows - 1; y++) {
            for (let x = 1; x < state.cols - 1; x++) {
                if (isWall(x, y)) continue;
                if (excluded.has(`${x},${y}`)) continue;
                const d = distGrid[y][x];
                if (d < 0) continue;
                const wallDirs = [];
                for (let dir = 0; dir < DIRS.length; dir++) {
                    const v = DIRS[dir];
                    if (isWall(x + v.x, y + v.y)) wallDirs.push(dir);
                }
                if (!wallDirs.length) continue;
                const tie = hash32(x, y, state.mazeSeed, 9133) % 1000;
                const score = d * 1000 + tie;
                if (score > bestScore) {
                    bestScore = score;
                    best = {
                        x,
                        y,
                        faceDir: chooseWallMountDirection(x, y, anchorX, anchorY),
                    };
                }
            }
        }
        return best;
    }

    function setupObjectiveAndInteractables() {
        state.interactables.clear();
        state.objective.keyCollected = false;
        state.objective.complete = false;
        state.objective.status = 'active';
        state.objective.text = 'Find the brass key and unlock the study door.';
        state.objective.hint = 'Find the glowing wall-mounted key, then press ENTER.';

        const alcoves = collectAlcoveCandidates();

        let start = { x: 1, y: 1 };
        if (alcoves.length) {
            const startIndex = hash32(state.mazeSeed, alcoves.length, state.styleVariant, 1777) % alcoves.length;
            start = alcoves[startIndex];
        }

        state.player.x = start.x;
        state.player.y = start.y;
        state.player.dir = Number.isInteger(start.openDir) ? start.openDir : getDeadEndOpenDirection(start.x, start.y);

        const distFromStart = bfsDistances(start.x, start.y);
        const used = new Set([`${start.x},${start.y}`]);

        let keyPos = pickTargetDistanceCandidate(alcoves, distFromStart, used, 7001, 0.58)
            || pickFarthestCandidate(alcoves, distFromStart, used, 7001);
        let layoutStrategy = 'alcove_pair';
        if (!keyPos) {
            keyPos = {
                x: start.x,
                y: start.y,
                faceDir: (getDeadEndOpenDirection(start.x, start.y) + 2) % 4,
            };
            layoutStrategy = 'single_alcove_fallback';
        }
        used.add(`${keyPos.x},${keyPos.y}`);

        const key = new Interactable({
            id: 'key',
            type: 'objective_key',
            x: keyPos.x,
            y: keyPos.y,
            faceDir: Number.isInteger(keyPos.faceDir) ? keyPos.faceDir : ((getDeadEndOpenDirection(keyPos.x, keyPos.y) + 2) % 4),
            telegraph: 'brass_key',
            onInteract(game, self) {
                if (game.objective.keyCollected) return;
                game.objective.keyCollected = true;
                playKeyPickup();
                game.objective.hint = 'You have the key. Find the locked study door and press ENTER.';
                self.state = 'consumed';
                buildGeometry();
                postObjectiveState();
            },
        });

        const distFromKey = bfsDistances(key.x, key.y);
        let doorPos = pickTargetDistanceCandidate(alcoves, distFromKey, used, 9001, 0.5)
            || pickFarthestCandidate(alcoves, distFromKey, used, 9001);
        if (!doorPos) {
            doorPos = pickFarthestWallMountCell(distFromKey, used, key.x, key.y);
            layoutStrategy = 'alcove_plus_wall_fallback';
        }
        if (!doorPos) {
            doorPos = {
                x: start.x,
                y: start.y,
                faceDir: chooseWallMountDirection(start.x, start.y, key.x, key.y),
            };
            layoutStrategy = 'start_cell_wall_fallback';
        }

        const studyDoor = new Interactable({
            id: 'study_door',
            type: 'locked_study_door',
            x: doorPos.x,
            y: doorPos.y,
            faceDir: Number.isInteger(doorPos.faceDir) ? doorPos.faceDir : chooseWallMountDirection(doorPos.x, doorPos.y, key.x, key.y),
            requires: 'key',
            telegraph: 'study_door',
            onInteract(game, self) {
                if (!game.objective.keyCollected) {
                    game.objective.hint = 'The study door is locked. Find the brass key first.';
                    postObjectiveState();
                    return;
                }
                self.state = 'opened';
                playDoorOpen();
                game.objective.complete = true;
                game.objective.status = 'complete';
                game.objective.hint = 'You unlocked the study. New maze loading...';
                postObjectiveState();
                setTimeout(() => startNewMaze(Math.floor(Math.random() * 1000000000) + 1, { advanceLevel: true }), 700);
            },
        });

        state.interactables.set('key', key);
        state.interactables.set('study_door', studyDoor);
        state.doorCell = { x: studyDoor.x, y: studyDoor.y };
        state.objectiveLayout = {
            strategy: layoutStrategy,
            alcoveCount: alcoves.length,
            key: { x: key.x, y: key.y, faceDir: key.faceDir },
            door: { x: studyDoor.x, y: studyDoor.y, faceDir: studyDoor.faceDir },
        };
    }
